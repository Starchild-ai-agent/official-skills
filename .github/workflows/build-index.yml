name: Build skills.json index

on:
  push:
    branches: [main]

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Build and validate skills.json
        run: |
          python3 << 'PYEOF'
          import json, os, re, sys, yaml

          SKIP = {".git", ".github", "scripts", "node_modules"}

          def parse_fm(content):
              m = re.match(r"^---\s*\n(.*?)\n---", content, re.DOTALL)
              if not m:
                  return {}
              try:
                  data = yaml.safe_load(m.group(1)) or {}
              except yaml.YAMLError as e:
                  raise RuntimeError(f"YAML parse error: {e}")
              return {
                  k: (str(data[k]).strip() if data.get(k) is not None else "")
                  for k in ("name", "version", "description")
                  if k in data
              }

          skills, errors = [], []
          for name in sorted(os.listdir(".")):
              if name.startswith(".") or name in SKIP:
                  continue
              if not os.path.isdir(name):
                  continue
              md = os.path.join(name, "SKILL.md")
              if not os.path.exists(md):
                  continue
              with open(md) as f:
                  content = f.read()
              try:
                  fm = parse_fm(content)
              except RuntimeError as e:
                  errors.append(f"{name}: {e}")
                  continue
              missing = [field for field in ("name", "version", "description") if field not in fm]
              if missing:
                  errors.append(name + ": missing " + ", ".join(missing))
              skills.append({
                  "name": fm.get("name", name),
                  "path": name + "/SKILL.md",
                  "version": fm.get("version", "0.0.0"),
                  "description": fm.get("description", ""),
              })

          if errors:
              print("Validation errors:", file=sys.stderr)
              for e in errors:
                  print("  - " + e, file=sys.stderr)
              sys.exit(1)

          with open("skills.json", "w") as f:
              json.dump({"registry": "starchild-official", "skills": skills}, f, indent=2, ensure_ascii=False)
              f.write("\n")
          print("skills.json: " + str(len(skills)) + " skills")
          PYEOF

      - name: Commit and push if changed
        run: |
          git diff --quiet skills.json && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.json
          git commit -m "chore: update skills.json index"
          git push
