<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — API Testing Playground" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Azeret Mono (code/display) + Lexend (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==================== Theme Toggle ==================== -->
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ==================== Hero (H9 Tool Hero) ==================== -->
  <header class="hero" role="banner">
    <div class="container hero__container">
      <div class="hero__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <h1 class="hero__title">{{APP_TITLE}}</h1>
      <p class="hero__subtitle">Test, debug, and explore APIs in real-time</p>
    </div>
  </header>

  <!-- ==================== Split Layout ==================== -->
  <main class="split-layout">
    <!-- Left: Request Builder -->
    <section class="panel panel--request">
      <div class="panel__header">
        <h2 class="panel__title">Request</h2>
      </div>

      <!-- Method + URL -->
      <div class="request-bar">
        <select class="request-bar__method" id="http-method">
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="DELETE">DELETE</option>
          <option value="PATCH">PATCH</option>
        </select>
        <input class="request-bar__url" id="request-url" type="text" placeholder="https://api.example.com/endpoint" />
        <button class="request-bar__send" id="send-btn" type="button">Send</button>
      </div>

      <!-- Tabs: Headers / Body -->
      <div class="request-tabs">
        <button class="request-tab active" data-tab="headers">Headers</button>
        <button class="request-tab" data-tab="body">Body</button>
      </div>

      <!-- Headers Editor -->
      <div class="tab-content" id="tab-headers">
        <div class="kv-editor" id="headers-editor">
          <div class="kv-row">
            <input class="kv-row__key" type="text" placeholder="Key" value="Content-Type" />
            <input class="kv-row__value" type="text" placeholder="Value" value="application/json" />
            <button class="kv-row__remove" type="button" aria-label="Remove">&times;</button>
          </div>
        </div>
        <button class="kv-add" id="add-header" type="button">+ Add Header</button>
      </div>

      <!-- Body Editor -->
      <div class="tab-content hidden" id="tab-body">
        <textarea class="body-editor" id="request-body" placeholder='{"key": "value"}' rows="8"></textarea>
      </div>
    </section>

    <!-- Right: Response Viewer -->
    <section class="panel panel--response">
      <div class="panel__header">
        <h2 class="panel__title">Response</h2>
        <div class="response-meta" id="response-meta"></div>
      </div>
      <div class="response-body" id="response-body">
        <div class="response-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="response-empty__icon"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
          <p>Send a request to see the response</p>
        </div>
      </div>
    </section>
  </main>

  <!-- ==================== History ==================== -->
  <section class="section section--history" id="history-section">
    <div class="container">
      <h2 class="section__title">History</h2>
      <div class="history-list" id="history-list">
        <p class="history-empty">No requests yet</p>
      </div>
    </div>
  </section>

  <!-- ==================== Footer ==================== -->
  <footer class="footer">
    <div class="container">
      <p class="footer__text">{{APP_TITLE}} — Lightweight API testing in the browser</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
