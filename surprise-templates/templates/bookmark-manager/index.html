<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Bookmark Manager" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Merriweather (heading) + Source Sans 3 (body) + Fira Code (url) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Source+Sans+3:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <!-- Add Bookmark Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>Add Bookmark</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form class="modal-form" id="addForm">
        <label class="form-field">
          <span>URL</span>
          <input type="url" id="inputUrl" placeholder="https://example.com" required />
        </label>
        <label class="form-field">
          <span>Title</span>
          <input type="text" id="inputTitle" placeholder="Bookmark title" required />
        </label>
        <label class="form-field">
          <span>Category</span>
          <input type="text" id="inputCategory" placeholder="e.g. Design, Dev, Reading" list="categoryList" />
          <datalist id="categoryList"></datalist>
        </label>
        <button type="submit" class="btn btn-primary">Save Bookmark</button>
      </form>
    </div>
  </div>

  <!-- Layout: A6 Sidebar + Content -->
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-title">{{APP_TITLE}}</h1>
        <p class="sidebar-sub">{{USER_NAME}}'s Library</p>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-category="all">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          All Bookmarks
          <span class="nav-count" id="countAll">0</span>
        </button>
        <div class="nav-divider"></div>
        <div id="categoryNav"></div>
      </nav>
      <button class="btn btn-add" id="btnAdd">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Bookmark
      </button>
    </aside>

    <!-- Mobile Sidebar Toggle -->
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <!-- Main Content -->
    <main class="content">
      <!-- Hero: H10 Inline Hero (search integrated) -->
      <header class="inline-hero" data-animate="stagger">
        <div class="search-wrapper">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search bookmarks…" autocomplete="off" />
        </div>
        <div class="hero-meta">
          <span class="hero-count" id="heroCount">0 bookmarks</span>
        </div>
      </header>

      <!-- Bookmark Grid -->
      <div class="bookmark-grid" id="bookmarkGrid"></div>
      <p class="empty-state" id="emptyState">No bookmarks yet. Click "Add Bookmark" to get started.</p>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
