<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Competitor token analysis and comparison" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Sora (headings) + Figtree (body) + JetBrains Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ==================== Hero: H14 Comparison ==================== -->
  <header class="hero" role="banner">
    <div class="container">
      <p class="hero__label">Competitor Analysis</p>
      <h1 class="hero__title">Token <span class="hero__accent">vs</span> Token</h1>
      <p class="hero__subtitle">Side-by-side comparison of market cap, TVL, holders, and development activity.</p>
      <div class="hero__selector">
        <div class="hero__select-group">
          <label class="hero__select-label" for="token-a">Token A</label>
          <select class="hero__select" id="token-a">
            <option value="ethereum">Ethereum (ETH)</option>
            <option value="solana">Solana (SOL)</option>
            <option value="avalanche-2">Avalanche (AVAX)</option>
            <option value="cardano">Cardano (ADA)</option>
            <option value="polkadot">Polkadot (DOT)</option>
          </select>
        </div>
        <span class="hero__vs">VS</span>
        <div class="hero__select-group">
          <label class="hero__select-label" for="token-b">Token B</label>
          <select class="hero__select" id="token-b">
            <option value="solana">Solana (SOL)</option>
            <option value="ethereum">Ethereum (ETH)</option>
            <option value="avalanche-2">Avalanche (AVAX)</option>
            <option value="cardano">Cardano (ADA)</option>
            <option value="polkadot">Polkadot (DOT)</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <!-- ==================== Side-by-Side Comparison (A8) ==================== -->
  <section class="section" id="comparison-section">
    <div class="container">
      <h2 class="section__title">Head-to-Head</h2>
      <div class="comparison-grid" id="comparison-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- ==================== Price Trend Chart ==================== -->
  <section class="section" id="chart-section">
    <div class="container">
      <h2 class="section__title">Price Trend (7d)</h2>
      <div class="chart-container">
        <canvas id="price-chart"></canvas>
      </div>
    </div>
  </section>

  <!-- ==================== Strengths & Weaknesses ==================== -->
  <section class="section" id="swot-section">
    <div class="container">
      <h2 class="section__title">Strengths & Weaknesses</h2>
      <div class="swot-grid" id="swot-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- ==================== Footer ==================== -->
  <footer class="footer">
    <div class="container">
      <p class="footer__text">Market data via CoinGecko · Analysis simulated</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
