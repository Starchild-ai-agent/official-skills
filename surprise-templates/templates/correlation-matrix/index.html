<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Portfolio correlation matrix & diversification analysis" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Outfit (headings) + Switzer (body) + JetBrains Mono (data) -->
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=outfit@400;500;600;700&f[]=switzer@400;500;600&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise-overlay" aria-hidden="true"></div>

  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ==================== H2 Compact Stats Bar Hero ==================== -->
  <header class="hero" role="banner">
    <div class="hero__bg-image" aria-hidden="true"></div>
    <div class="container hero__container">
      <div class="hero__top-row">
        <div class="hero__brand">
          <div class="hero__pulse"><span class="hero__pulse-dot" aria-hidden="true"></span><span>ANALYZING</span></div>
          <h1 class="hero__title">{{APP_TITLE}}</h1>
          <p class="hero__subtitle">Welcome back, <strong>{{USER_NAME}}</strong></p>
        </div>
        <time class="hero__time" id="hero-time" datetime="">Loading...</time>
      </div>
      <!-- Compact Stats Bar -->
      <div class="hero__stats-bar">
        <div class="hero__stat">
          <span class="hero__stat-label">DIVERSITY SCORE</span>
          <span class="hero__stat-value hero__stat-value--accent" id="hero-diversity">--</span>
        </div>
        <div class="hero__stat-divider" aria-hidden="true"></div>
        <div class="hero__stat">
          <span class="hero__stat-label">HIGHEST CORR</span>
          <span class="hero__stat-value text-down" id="hero-highest">--</span>
        </div>
        <div class="hero__stat-divider" aria-hidden="true"></div>
        <div class="hero__stat">
          <span class="hero__stat-label">LOWEST CORR</span>
          <span class="hero__stat-value text-up" id="hero-lowest">--</span>
        </div>
        <div class="hero__stat-divider" aria-hidden="true"></div>
        <div class="hero__stat">
          <span class="hero__stat-label">TOKENS</span>
          <span class="hero__stat-value" id="hero-token-count">--</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ==================== A17 Full-width Sections ==================== -->
  <main class="dashboard" role="main">

    <!-- Section 1: Heatmap (full-width) -->
    <section class="section-panel" aria-label="Correlation Heatmap">
      <div class="container">
        <div class="section-panel__header">
          <h2 class="section-panel__title">
            <svg class="section-panel__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
            Correlation Heatmap
          </h2>
          <div class="section-panel__controls">
            <div class="time-selector" id="time-selector">
              <button class="time-btn" data-days="7">7D</button>
              <button class="time-btn time-btn--active" data-days="30">30D</button>
              <button class="time-btn" data-days="90">90D</button>
            </div>
            <span class="section-panel__badge section-panel__badge--live"><span class="section-panel__badge-dot"></span>LIVE</span>
          </div>
        </div>
        <div class="heatmap-container" id="heatmap-container">
          <canvas id="heatmap-canvas" aria-label="Correlation heatmap matrix" role="img"></canvas>
        </div>
        <div class="heatmap-legend" aria-hidden="true">
          <span class="heatmap-legend__label">-1.0</span>
          <div class="heatmap-legend__bar"></div>
          <span class="heatmap-legend__label">+1.0</span>
        </div>
      </div>
    </section>

    <!-- Section 2: Correlation Ranking (full-width) -->
    <section class="section-panel" aria-label="Correlation Ranking">
      <div class="container">
        <div class="section-panel__header">
          <h2 class="section-panel__title">
            <svg class="section-panel__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            Correlation Ranking
          </h2>
          <span class="section-panel__badge">All Pairs</span>
        </div>
        <div class="corr-ranking" id="corr-ranking">
          <!-- Populated by script.js -->
        </div>
      </div>
    </section>

    <!-- Section 3: Suggestions + Tips side by side -->
    <section class="section-panel" aria-label="Analysis & Tips">
      <div class="container">
        <div class="section-panel__split">
          <div class="section-panel__half">
            <div class="section-panel__header">
              <h2 class="section-panel__title">
                <svg class="section-panel__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                Portfolio Analysis
              </h2>
            </div>
            <div class="suggestions" id="suggestions">
              <!-- Populated by script.js -->
            </div>
          </div>
          <div class="section-panel__half">
            <div class="section-panel__header">
              <h2 class="section-panel__title">
                <svg class="section-panel__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                Diversification Tips
              </h2>
            </div>
            <div class="tips-list" id="tips-list">
              <!-- Populated by script.js -->
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="footer" role="contentinfo">
    <div class="container footer__container">
      <p class="footer__text">Price data by <a href="https://www.coingecko.com" target="_blank" rel="noopener noreferrer">CoinGecko</a></p>
      <p class="footer__text footer__text--mono">Correlation updates every 5 min</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
