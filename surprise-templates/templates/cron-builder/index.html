<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{APP_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <div class="header-indicator"></div>
      <h1 class="logo">{{APP_TITLE}}</h1>
    </div>
    <div class="header-right">
      <span class="user-greeting">{{USER_NAME}}</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main class="main-content">
    <!-- Hero: Interactive Cron Input -->
    <section class="hero-interactive" id="heroSection">
      <div class="hero-inner">
        <p class="hero-label">Cron Expression Builder</p>
        <div class="cron-display" id="cronDisplay">* * * * *</div>
        <p class="cron-readable" id="cronReadable">Every minute</p>
        <button class="copy-btn" id="copyBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy Expression
        </button>
      </div>
    </section>

    <!-- Presets -->
    <section class="presets-section" id="presetsSection">
      <h2 class="section-title">Quick Presets</h2>
      <div class="presets-grid">
        <button class="preset-btn" data-cron="* * * * *">Every Minute</button>
        <button class="preset-btn" data-cron="0 * * * *">Every Hour</button>
        <button class="preset-btn" data-cron="0 0 * * *">Every Day (midnight)</button>
        <button class="preset-btn" data-cron="0 3 * * *">Daily at 3:00 AM</button>
        <button class="preset-btn" data-cron="0 0 * * 1">Every Monday</button>
        <button class="preset-btn" data-cron="0 0 1 * *">First of Month</button>
        <button class="preset-btn" data-cron="*/5 * * * *">Every 5 Minutes</button>
        <button class="preset-btn" data-cron="0 9-17 * * 1-5">Weekdays 9-5 hourly</button>
      </div>
    </section>

    <!-- Builder Panel -->
    <section class="builder-section" id="builderSection">
      <h2 class="section-title">Build Expression</h2>
      <div class="cron-panel">
        <div class="field-group" data-field="minute">
          <label class="field-label">Minute</label>
          <select class="field-type" id="minuteType">
            <option value="every">Every minute (*)</option>
            <option value="specific">Specific</option>
            <option value="range">Range</option>
            <option value="step">Every N minutes</option>
          </select>
          <div class="field-inputs" id="minuteInputs">
            <input type="number" class="field-input" id="minuteValue" min="0" max="59" value="0" placeholder="0-59" />
            <input type="number" class="field-input field-hidden" id="minuteEnd" min="0" max="59" value="59" placeholder="End" />
            <input type="number" class="field-input field-hidden" id="minuteStep" min="1" max="59" value="5" placeholder="Step" />
          </div>
        </div>

        <div class="field-group" data-field="hour">
          <label class="field-label">Hour</label>
          <select class="field-type" id="hourType">
            <option value="every">Every hour (*)</option>
            <option value="specific">Specific</option>
            <option value="range">Range</option>
            <option value="step">Every N hours</option>
          </select>
          <div class="field-inputs" id="hourInputs">
            <input type="number" class="field-input" id="hourValue" min="0" max="23" value="0" placeholder="0-23" />
            <input type="number" class="field-input field-hidden" id="hourEnd" min="0" max="23" value="23" placeholder="End" />
            <input type="number" class="field-input field-hidden" id="hourStep" min="1" max="23" value="2" placeholder="Step" />
          </div>
        </div>

        <div class="field-group" data-field="day">
          <label class="field-label">Day of Month</label>
          <select class="field-type" id="dayType">
            <option value="every">Every day (*)</option>
            <option value="specific">Specific</option>
            <option value="range">Range</option>
            <option value="step">Every N days</option>
          </select>
          <div class="field-inputs" id="dayInputs">
            <input type="number" class="field-input" id="dayValue" min="1" max="31" value="1" placeholder="1-31" />
            <input type="number" class="field-input field-hidden" id="dayEnd" min="1" max="31" value="31" placeholder="End" />
            <input type="number" class="field-input field-hidden" id="dayStep" min="1" max="31" value="2" placeholder="Step" />
          </div>
        </div>

        <div class="field-group" data-field="month">
          <label class="field-label">Month</label>
          <select class="field-type" id="monthType">
            <option value="every">Every month (*)</option>
            <option value="specific">Specific</option>
            <option value="range">Range</option>
          </select>
          <div class="field-inputs" id="monthInputs">
            <select class="field-input" id="monthValue">
              <option value="1">January</option><option value="2">February</option>
              <option value="3">March</option><option value="4">April</option>
              <option value="5">May</option><option value="6">June</option>
              <option value="7">July</option><option value="8">August</option>
              <option value="9">September</option><option value="10">October</option>
              <option value="11">November</option><option value="12">December</option>
            </select>
            <select class="field-input field-hidden" id="monthEnd">
              <option value="1">January</option><option value="2">February</option>
              <option value="3">March</option><option value="4">April</option>
              <option value="5">May</option><option value="6">June</option>
              <option value="7">July</option><option value="8">August</option>
              <option value="9">September</option><option value="10">October</option>
              <option value="11">November</option><option value="12">December</option>
            </select>
          </div>
        </div>

        <div class="field-group" data-field="weekday">
          <label class="field-label">Day of Week</label>
          <select class="field-type" id="weekdayType">
            <option value="every">Every day (*)</option>
            <option value="specific">Specific</option>
            <option value="range">Range</option>
          </select>
          <div class="field-inputs" id="weekdayInputs">
            <div class="weekday-grid" id="weekdayGrid">
              <button class="weekday-btn" data-day="0">Sun</button>
              <button class="weekday-btn" data-day="1">Mon</button>
              <button class="weekday-btn" data-day="2">Tue</button>
              <button class="weekday-btn" data-day="3">Wed</button>
              <button class="weekday-btn" data-day="4">Thu</button>
              <button class="weekday-btn" data-day="5">Fri</button>
              <button class="weekday-btn" data-day="6">Sat</button>
            </div>
            <div class="weekday-range field-hidden" id="weekdayRange">
              <select class="field-input" id="weekdayStart">
                <option value="0">Sunday</option><option value="1">Monday</option>
                <option value="2">Tuesday</option><option value="3">Wednesday</option>
                <option value="4">Thursday</option><option value="5">Friday</option>
                <option value="6">Saturday</option>
              </select>
              <span class="range-sep">to</span>
              <select class="field-input" id="weekdayEnd">
                <option value="0">Sunday</option><option value="1">Monday</option>
                <option value="2">Tuesday</option><option value="3">Wednesday</option>
                <option value="4">Thursday</option><option value="5">Friday</option>
                <option value="6">Saturday</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Next Executions Table -->
    <section class="executions-section" id="executionsSection">
      <h2 class="section-title">Next 10 Executions</h2>
      <div class="table-wrap">
        <table class="exec-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Date</th>
              <th>Time</th>
              <th>Relative</th>
            </tr>
          </thead>
          <tbody id="execTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>Built for <strong>{{USER_NAME}}</strong> · Cron Expression Builder</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
