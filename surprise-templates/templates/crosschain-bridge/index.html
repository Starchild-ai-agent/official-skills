<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>{{APP_TITLE}} — Cross-Chain Bridge Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Karla:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀️</button>

  <!-- Comparison Hero -->
  <section class="hero" id="hero">
    <div class="hero__panel hero__panel--source">
      <div class="hero__label">Source Chain</div>
      <div class="hero__chain-icon" id="sourceIcon">E</div>
      <div class="hero__chain-name" id="sourceName">Ethereum</div>
      <select class="hero__select" id="sourceSelect">
        <option value="ethereum" selected>Ethereum</option>
        <option value="polygon">Polygon</option>
        <option value="arbitrum">Arbitrum</option>
        <option value="optimism">Optimism</option>
        <option value="bsc">BNB Chain</option>
        <option value="avalanche">Avalanche</option>
        <option value="base">Base</option>
      </select>
    </div>
    <div class="hero__divider">
      <div class="hero__arrow">→</div>
    </div>
    <div class="hero__panel hero__panel--target">
      <div class="hero__label">Target Chain</div>
      <div class="hero__chain-icon" id="targetIcon">A</div>
      <div class="hero__chain-name" id="targetName">Arbitrum</div>
      <select class="hero__select" id="targetSelect">
        <option value="ethereum">Ethereum</option>
        <option value="polygon">Polygon</option>
        <option value="arbitrum" selected>Arbitrum</option>
        <option value="optimism">Optimism</option>
        <option value="bsc">BNB Chain</option>
        <option value="avalanche">Avalanche</option>
        <option value="base">Base</option>
      </select>
    </div>
  </section>

  <!-- Route Comparison Table -->
  <section class="section" id="sectionRoutes">
    <h2 class="section__title">Bridge Route Comparison</h2>
    <div class="route-table-wrap">
      <table class="route-table">
        <thead>
          <tr>
            <th>Bridge</th>
            <th>Fee (USD)</th>
            <th>Est. Time</th>
            <th>Safety Score</th>
            <th>Max Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="routeTableBody"></tbody>
      </table>
    </div>
  </section>

  <!-- Fee Comparison Chart -->
  <section class="section" id="sectionChart">
    <h2 class="section__title">Fee Comparison</h2>
    <div class="chart-container">
      <canvas id="feeChart"></canvas>
    </div>
  </section>

  <!-- Best Route Recommendation -->
  <section class="section" id="sectionRecommend">
    <h2 class="section__title">Recommended Routes</h2>
    <div class="rec-grid" id="recGrid"></div>
  </section>

  <!-- Bridge History -->
  <section class="section" id="sectionHistory">
    <h2 class="section__title">Bridge History</h2>
    <div class="history-list" id="historyList"></div>
  </section>

  <footer class="footer">
    {{APP_TITLE}} · Optimized by {{USER_NAME}}
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
