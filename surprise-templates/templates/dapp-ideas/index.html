<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — DApp Idea Generator" />
  <title>{{APP_TITLE}}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <!-- ==================== Hero (H15 Interactive) ==================== -->
  <header class="hero" role="banner">
    <div class="container hero__container">
      <h1 class="hero__title">{{APP_TITLE}}</h1>
      <p class="hero__subtitle">Discover your next decentralized application idea</p>
      <div class="hero__controls">
        <select class="hero__select" id="chain-select">
          <option value="all">Any Chain</option>
          <option value="ethereum">Ethereum</option>
          <option value="solana">Solana</option>
          <option value="polygon">Polygon</option>
          <option value="arbitrum">Arbitrum</option>
        </select>
        <select class="hero__select" id="category-select">
          <option value="all">Any Category</option>
          <option value="defi">DeFi</option>
          <option value="nft">NFT</option>
          <option value="dao">DAO</option>
          <option value="social">Social</option>
          <option value="gaming">Gaming</option>
        </select>
        <button class="hero__generate-btn" id="generate-btn" type="button">Generate Idea</button>
      </div>
    </div>
  </header>

  <!-- ==================== Current Idea (Centered A11) ==================== -->
  <section class="section section--idea" id="idea-section">
    <div class="container">
      <div class="idea-card" id="idea-card">
        <div class="idea-card__empty">Select filters and generate a DApp idea</div>
      </div>
    </div>
  </section>

  <!-- ==================== Saved Ideas ==================== -->
  <section class="section section--saved" id="saved-section">
    <div class="container">
      <h2 class="section__title">Saved Ideas</h2>
      <div class="saved-list" id="saved-list">
        <p class="saved-empty">No saved ideas yet</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p class="footer__text">{{APP_TITLE}} — Build the decentralized future</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
