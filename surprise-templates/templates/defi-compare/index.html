<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeFi Protocol Comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Figtree:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="theme-toggle__icon theme-toggle__icon--light">☀</span>
    <span class="theme-toggle__icon theme-toggle__icon--dark">☾</span>
  </button>

  <div class="app">
    <header class="hero">
      <h1 class="hero__title">DeFi Compare</h1>
      <p class="hero__sub">Side-by-side protocol analysis</p>
    </header>

    <!-- Protocol Selectors -->
    <section class="selectors">
      <div class="selector">
        <label class="selector__label">Protocol A</label>
        <select class="selector__select" id="protocolA">
          <option value="aave">Aave</option>
          <option value="compound">Compound</option>
          <option value="makerdao">MakerDAO</option>
          <option value="uniswap">Uniswap</option>
          <option value="curve">Curve</option>
          <option value="lido">Lido</option>
        </select>
      </div>
      <div class="selector__vs">VS</div>
      <div class="selector">
        <label class="selector__label">Protocol B</label>
        <select class="selector__select" id="protocolB">
          <option value="compound">Compound</option>
          <option value="aave">Aave</option>
          <option value="makerdao">MakerDAO</option>
          <option value="uniswap">Uniswap</option>
          <option value="curve">Curve</option>
          <option value="lido">Lido</option>
        </select>
      </div>
    </section>

    <!-- Comparison Table -->
    <section class="comparison" id="comparison"></section>

    <!-- Chart -->
    <section class="chart-section">
      <h2 class="section-title">TVL Comparison</h2>
      <div class="chart-wrap">
        <canvas id="compareChart"></canvas>
      </div>
    </section>

    <!-- Pros/Cons -->
    <section class="proscons" id="proscons"></section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
