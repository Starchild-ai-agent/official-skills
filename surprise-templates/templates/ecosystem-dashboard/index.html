<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Multi-chain ecosystem dashboard" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Geist (headings) + Figtree (body) + JetBrains Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ==================== Layout: A6 Sidebar+Content ==================== -->
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <h2 class="sidebar__title">Chains</h2>
      </div>
      <nav class="sidebar__nav" id="chain-nav">
        <button class="chain-btn chain-btn--active" data-chain="ethereum">
          <span class="chain-btn__dot" style="background:#627eea"></span>
          Ethereum
        </button>
        <button class="chain-btn" data-chain="base">
          <span class="chain-btn__dot" style="background:#0052ff"></span>
          Base
        </button>
        <button class="chain-btn" data-chain="arbitrum">
          <span class="chain-btn__dot" style="background:#28a0f0"></span>
          Arbitrum
        </button>
        <button class="chain-btn" data-chain="optimism">
          <span class="chain-btn__dot" style="background:#ff0420"></span>
          Optimism
        </button>
        <button class="chain-btn" data-chain="polygon">
          <span class="chain-btn__dot" style="background:#8247e5"></span>
          Polygon
        </button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Hero: H10 Inline -->
      <header class="hero" role="banner">
        <div class="hero__inline">
          <div>
            <p class="hero__label" id="hero-chain-label">Ethereum Ecosystem</p>
            <h1 class="hero__title" id="hero-chain-title">Ethereum</h1>
          </div>
          <div class="hero__stats">
            <div class="hero__stat">
              <span class="hero__stat-value" id="stat-tvl">—</span>
              <span class="hero__stat-label">TVL</span>
            </div>
            <div class="hero__stat">
              <span class="hero__stat-value" id="stat-addresses">—</span>
              <span class="hero__stat-label">Active Addr</span>
            </div>
            <div class="hero__stat">
              <span class="hero__stat-value" id="stat-gas">—</span>
              <span class="hero__stat-label">Avg Gas</span>
            </div>
          </div>
        </div>
      </header>

      <!-- Metrics Cards -->
      <section class="section" id="metrics">
        <div class="metrics-grid" id="metrics-grid">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Top DApps -->
      <section class="section" id="dapps">
        <h2 class="section__title">Top DApps</h2>
        <div class="dapps-list" id="dapps-list">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Chain Comparison Chart -->
      <section class="section" id="comparison">
        <h2 class="section__title">Chain Comparison</h2>
        <div class="chart-container">
          <canvas id="comparison-chart"></canvas>
        </div>
      </section>
    </main>
  </div>

  <!-- ==================== Footer ==================== -->
  <footer class="footer">
    <div class="container">
      <p class="footer__text">Data from DeFi Llama & CoinGecko · Simulated for demo</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
