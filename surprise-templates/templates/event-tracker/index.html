<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Event Tracker" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Nunito (display) + Karla (body) + Source Code Pro (mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Karla:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ==================== Hero (H13 Countdown) ==================== -->
  <header class="hero" role="banner">
    <div class="container hero__container">
      <p class="hero__label">Event Tracker</p>
      <h1 class="hero__title">Never Miss<br/>An Event</h1>
      <p class="hero__subtitle">Track conferences, hackathons, AMAs, and launches across the ecosystem.</p>
      <div class="hero__countdown" id="hero-countdown">
        <p class="hero__countdown-label">Next event in</p>
        <div class="hero__countdown-grid">
          <div class="countdown-unit">
            <span class="countdown-unit__value" id="cd-days">00</span>
            <span class="countdown-unit__label">Days</span>
          </div>
          <div class="countdown-unit">
            <span class="countdown-unit__value" id="cd-hours">00</span>
            <span class="countdown-unit__label">Hours</span>
          </div>
          <div class="countdown-unit">
            <span class="countdown-unit__value" id="cd-mins">00</span>
            <span class="countdown-unit__label">Mins</span>
          </div>
          <div class="countdown-unit">
            <span class="countdown-unit__value" id="cd-secs">00</span>
            <span class="countdown-unit__label">Secs</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ==================== Filter Bar ==================== -->
  <section class="section" id="filters">
    <div class="container">
      <div class="filter-tabs" id="filter-tabs">
        <!-- JS rendered -->
      </div>
    </div>
  </section>

  <!-- ==================== Calendar View ==================== -->
  <section class="section" id="calendar-section">
    <div class="container">
      <h2 class="section__title">Calendar</h2>
      <div class="calendar" id="calendar">
        <!-- JS rendered -->
      </div>
    </div>
  </section>

  <!-- ==================== Event List ==================== -->
  <section class="section" id="event-list-section">
    <div class="container">
      <h2 class="section__title">Upcoming Events</h2>
      <div class="event-list" id="event-list">
        <!-- JS rendered -->
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p class="footer__text">Event Tracker — Built with mock data</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
