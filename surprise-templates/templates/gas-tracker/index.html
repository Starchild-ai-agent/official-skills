<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Gas Fee Tracker" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Space Grotesk (headings) + Inter (body) + JetBrains Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Noise texture overlay -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- ==================== Theme Toggle ==================== -->
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ==================== Gauge Hero (H9) ==================== -->
  <header class="gauge-hero" role="banner">
    <div class="container">
      <div class="gauge-hero__top">
        <div class="gauge-hero__info">
          <span class="gauge-hero__label">GAS TRACKER</span>
          <h1 class="gauge-hero__title"><span class="accent">{{APP_TITLE}}</span></h1>
          <p class="gauge-hero__subtitle">Welcome back, <strong>{{USER_NAME}}</strong></p>
          <time class="gauge-hero__time" id="hero-time" datetime="">Loading...</time>
        </div>
        <div class="gauge-hero__gauge-wrap">
          <div class="gauge-container" id="gauge-container">
            <div class="gauge">
              <canvas class="gauge__canvas" id="gauge-canvas" aria-label="Gas price gauge" role="img"></canvas>
              <div class="gauge__value" id="gauge-value" aria-live="polite">--</div>
            </div>
            <div class="gauge__label" id="gauge-label">Loading...</div>
            <div class="gauge__unit">Gwei</div>
          </div>
        </div>
      </div>
      <!-- KPI strip below gauge -->
      <div class="gauge-hero__kpis">
        <div class="gauge-hero__kpi">
          <span class="gauge-hero__kpi-label">LOW</span>
          <span class="gauge-hero__kpi-value" id="hero-low">--</span>
        </div>
        <div class="gauge-hero__kpi-divider" aria-hidden="true"></div>
        <div class="gauge-hero__kpi">
          <span class="gauge-hero__kpi-label">AVERAGE</span>
          <span class="gauge-hero__kpi-value gauge-hero__kpi-value--accent" id="hero-avg">--</span>
        </div>
        <div class="gauge-hero__kpi-divider" aria-hidden="true"></div>
        <div class="gauge-hero__kpi">
          <span class="gauge-hero__kpi-label">HIGH</span>
          <span class="gauge-hero__kpi-value" id="hero-high">--</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ==================== Dashboard — 3-Column Grid ==================== -->
  <main class="dashboard" role="main">
    <div class="container">
      <div class="dashboard-grid">

        <!-- Metric Card: Cost Estimator (spans 2 cols) -->
        <section class="metric-card metric-card--wide" aria-label="Transaction Cost Estimator">
          <div class="metric-card__header">
            <h2 class="metric-card__title">
              <svg class="metric-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>
              </svg>
              Cost Estimator
            </h2>
            <span class="metric-card__badge">ETH Price Included</span>
          </div>
          <div class="cost-grid" id="cost-grid">
            <!-- Populated by script.js -->
          </div>
        </section>

        <!-- Metric Card: Best Time to Transact -->
        <section class="metric-card" aria-label="Best Transaction Time">
          <div class="metric-card__header">
            <h2 class="metric-card__title">
              <svg class="metric-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              Best Time to Transact
            </h2>
            <span class="metric-card__badge">Advice</span>
          </div>
          <div class="advice-list" id="advice-list">
            <!-- Populated by script.js -->
          </div>
        </section>

        <!-- Metric Card: 24h Gas Trend (spans full width) -->
        <section class="metric-card metric-card--full" aria-label="24h Gas Trend">
          <div class="metric-card__header">
            <h2 class="metric-card__title">
              <svg class="metric-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>
              </svg>
              24h Gas Trend
            </h2>
            <span class="metric-card__badge">Simulated</span>
          </div>
          <div class="chart-container" id="trend-chart-container">
            <canvas id="trend-chart" aria-label="24 hour gas price trend chart" role="img"></canvas>
          </div>
        </section>

      </div>
    </div>
  </main>

  <!-- ==================== Footer ==================== -->
  <footer class="footer" role="contentinfo">
    <div class="container footer__container">
      <p class="footer__text">
        Gas data by <a href="https://etherscan.io" target="_blank" rel="noopener noreferrer">Etherscan</a>
        &amp; prices by <a href="https://www.coingecko.com" target="_blank" rel="noopener noreferrer">CoinGecko</a>
      </p>
      <p class="footer__text footer__text--mono">Gas prices update every 15s</p>
    </div>
  </footer>

  <!-- App Script -->
  <script src="script.js"></script>

</body>
</html>
