<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Habit Tracker" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Nunito (heading) + Karla (body) + Source Code Pro (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Karla:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <main class="app-wrapper">
    <!-- Hero: H7 Minimal Hero (compact stats bar) -->
    <header class="hero-bar" data-animate="alt">
      <div class="hero-content">
        <h1 class="hero-title">{{APP_TITLE}}</h1>
        <p class="hero-sub">Welcome back, {{USER_NAME}}</p>
      </div>
      <div class="hero-stats">
        <div class="hero-stat">
          <span class="hero-stat-value" id="totalHabits">0</span>
          <span class="hero-stat-label">Habits</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-value" id="todayRate">0%</span>
          <span class="hero-stat-label">Today</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-value" id="bestStreak">0</span>
          <span class="hero-stat-label">Best Streak</span>
        </div>
      </div>
    </header>

    <!-- Add Habit Form -->
    <section class="add-section" data-animate="alt">
      <form class="add-form" id="addForm">
        <input type="text" id="habitInput" placeholder="New habit…" autocomplete="off" />
        <select id="habitIcon">
          <option value="💧">💧 Water</option>
          <option value="🏃">🏃 Exercise</option>
          <option value="📖">📖 Reading</option>
          <option value="🧘">🧘 Meditate</option>
          <option value="💤">💤 Sleep</option>
          <option value="🥗">🥗 Eat Healthy</option>
          <option value="✏️">✏️ Journal</option>
          <option value="⭐">⭐ Custom</option>
        </select>
        <button type="submit" class="btn btn-primary">Add</button>
      </form>
    </section>

    <!-- Vertical Timeline: Habit Rows with Day Cells -->
    <section class="timeline-section">
      <div class="timeline-header" data-animate="alt">
        <h2 class="section-title">This Week</h2>
        <div class="day-labels" id="dayLabels"></div>
      </div>
      <div class="timeline-line"></div>
      <div class="habit-list" id="habitList"></div>
      <p class="empty-state" id="emptyState">No habits yet. Add your first habit above!</p>
    </section>

    <!-- Monthly Heatmap -->
    <section class="heatmap-section" data-animate="alt">
      <h2 class="section-title">Monthly Overview</h2>
      <div class="heatmap-grid" id="heatmapGrid"></div>
      <div class="heatmap-legend">
        <span>Less</span>
        <span class="heatmap-swatch" style="opacity:0.15"></span>
        <span class="heatmap-swatch" style="opacity:0.35"></span>
        <span class="heatmap-swatch" style="opacity:0.55"></span>
        <span class="heatmap-swatch" style="opacity:0.75"></span>
        <span class="heatmap-swatch" style="opacity:1"></span>
        <span>More</span>
      </div>
    </section>

    <!-- Weekly Stats Chart -->
    <section class="chart-section" data-animate="alt">
      <h2 class="section-title">Weekly Stats</h2>
      <div class="chart-wrapper">
        <canvas id="weeklyChart"></canvas>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
