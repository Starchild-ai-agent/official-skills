<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Industry News Radar" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Merriweather (display) + Source Sans 3 (body) + IBM Plex Mono (mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Source+Sans+3:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ==================== Hero (H12 Alert Banner) ==================== -->
  <header class="hero" role="banner">
    <div class="hero__alert-bar">
      <span class="hero__alert-dot" aria-hidden="true"></span>
      <span class="hero__alert-text">LIVE FEED</span>
      <span class="hero__alert-count" id="alert-count">24 new stories</span>
    </div>
    <div class="container hero__container">
      <h1 class="hero__title">Industry<br/>News Radar</h1>
      <p class="hero__subtitle">Real-time news aggregation across Crypto, AI, Tech, and Finance.</p>
    </div>
  </header>

  <!-- ==================== Category Filter ==================== -->
  <section class="section" id="filter-bar">
    <div class="container">
      <div class="filter-row">
        <div class="filter-tabs" id="filter-tabs">
          <!-- JS rendered -->
        </div>
        <div class="filter-sort">
          <select class="sort-select" id="sort-select">
            <option value="time">Latest First</option>
            <option value="credibility">By Credibility</option>
            <option value="category">By Category</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <!-- ==================== News Feed ==================== -->
  <section class="section" id="news-feed">
    <div class="container">
      <div class="feed-list" id="feed-list">
        <!-- JS rendered -->
      </div>
    </div>
  </section>

  <!-- ==================== Source Credibility ==================== -->
  <section class="section" id="sources">
    <div class="container">
      <h2 class="section__title">Source Credibility</h2>
      <p class="section__desc">Trust scores based on historical accuracy and editorial standards.</p>
      <div class="source-grid" id="source-grid">
        <!-- JS rendered -->
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p class="footer__text">Industry News Radar — Built with mock data</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
