<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{APP_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <h1 class="logo">{{APP_TITLE}}</h1>
    </div>
    <div class="header-right">
      <span class="user-greeting">{{USER_NAME}}</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main class="main-content">
    <!-- Hero / Tool Input -->
    <section class="hero-tool" id="heroTool">
      <h2 class="hero-title">Paste your JSON</h2>
      <p class="hero-sub">Format, validate, and explore JSON data</p>
      <div class="formatter-panel input-panel">
        <div class="panel-header">
          <span class="panel-label">Input</span>
          <div class="panel-actions">
            <button class="action-btn" id="pasteBtn" title="Paste from clipboard">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Paste
            </button>
            <button class="action-btn" id="sampleBtn" title="Load sample JSON">Sample</button>
            <button class="action-btn" id="clearBtn" title="Clear input">Clear</button>
          </div>
        </div>
        <textarea class="json-input" id="jsonInput" spellcheck="false" placeholder='{"key": "value"}'></textarea>
        <div class="error-bar" id="errorBar"></div>
      </div>
    </section>

    <!-- Controls -->
    <section class="controls-section">
      <div class="controls-row">
        <div class="indent-selector">
          <span class="control-label">Indent:</span>
          <button class="indent-btn active" data-indent="2">2 spaces</button>
          <button class="indent-btn" data-indent="4">4 spaces</button>
          <button class="indent-btn" data-indent="tab">Tab</button>
        </div>
        <div class="view-selector">
          <button class="view-btn active" data-view="formatted" id="viewFormatted">Formatted</button>
          <button class="view-btn" data-view="minified" id="viewMinified">Minified</button>
          <button class="view-btn" data-view="tree" id="viewTree">Tree</button>
        </div>
        <button class="copy-btn" id="copyBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy Result
        </button>
      </div>
    </section>

    <!-- Output -->
    <section class="output-section" id="outputSection">
      <div class="formatter-panel output-panel">
        <div class="panel-header">
          <span class="panel-label">Output</span>
          <span class="path-display" id="pathDisplay"></span>
        </div>
        <div class="output-area" id="outputArea">
          <pre class="formatted-output" id="formattedOutput"></pre>
          <div class="tree-output" id="treeOutput" style="display:none"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>&copy; 2025 {{APP_TITLE}}. Debug with confidence.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
