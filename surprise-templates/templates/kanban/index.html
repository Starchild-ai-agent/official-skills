<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{APP_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Nunito:wght@400;500;600&family=Source+Code+Pro:wght@500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <h1 class="logo">{{APP_TITLE}}</h1>
    </div>
    <div class="header-center">
      <div class="stats-bar" id="statsBar">
        <div class="stat-pill">
          <span class="stat-dot dot-todo"></span>
          <span class="stat-count" id="countTodo">0</span> Todo
        </div>
        <div class="stat-pill">
          <span class="stat-dot dot-progress"></span>
          <span class="stat-count" id="countProgress">0</span> In Progress
        </div>
        <div class="stat-pill">
          <span class="stat-dot dot-done"></span>
          <span class="stat-count" id="countDone">0</span> Done
        </div>
      </div>
    </div>
    <div class="header-right">
      <span class="user-greeting">{{USER_NAME}}</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main class="main-content">
    <div class="board" id="board">
      <!-- Todo Column -->
      <div class="column" data-status="todo">
        <div class="column-header">
          <h2 class="column-title">Todo</h2>
          <button class="add-task-btn" data-status="todo" aria-label="Add task">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="card-list" id="listTodo" data-status="todo"></div>
      </div>

      <!-- In Progress Column -->
      <div class="column" data-status="progress">
        <div class="column-header">
          <h2 class="column-title">In Progress</h2>
          <button class="add-task-btn" data-status="progress" aria-label="Add task">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="card-list" id="listProgress" data-status="progress"></div>
      </div>

      <!-- Done Column -->
      <div class="column" data-status="done">
        <div class="column-header">
          <h2 class="column-title">Done</h2>
          <button class="add-task-btn" data-status="done" aria-label="Add task">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="card-list" id="listDone" data-status="done"></div>
      </div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="taskModal">
      <h3 class="modal-title" id="modalTitle">Add Task</h3>
      <form id="taskForm">
        <input type="hidden" id="taskId" />
        <input type="hidden" id="taskStatus" />
        <div class="form-group">
          <label for="taskTitleInput">Title</label>
          <input type="text" id="taskTitleInput" placeholder="Task title..." required />
        </div>
        <div class="form-group">
          <label for="taskDesc">Description</label>
          <textarea id="taskDesc" rows="3" placeholder="Optional description..."></textarea>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <div class="priority-selector">
            <button type="button" class="priority-btn priority-low active" data-priority="low">Low</button>
            <button type="button" class="priority-btn priority-medium" data-priority="medium">Medium</button>
            <button type="button" class="priority-btn priority-high" data-priority="high">High</button>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="cancelModal">Cancel</button>
          <button type="submit" class="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="app-footer">
    <p>&copy; 2025 {{APP_TITLE}}. Stay organized.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
