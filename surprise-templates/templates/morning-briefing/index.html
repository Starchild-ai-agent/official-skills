<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Your personalized morning intelligence briefing" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Playfair Display (serif headings) + Lato (body) + Source Code Pro (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Code+Pro:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==================== Theme Toggle ==================== -->
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <!-- Sun icon (shown in dark mode — click to switch to light) -->
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
    </svg>
    <!-- Moon icon (shown in light mode — click to switch to dark) -->
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
    </svg>
  </button>

  <!-- ==================== Hero / Greeting ==================== -->
  <header class="hero" role="banner">
    <div class="hero__bg-image" aria-hidden="true"></div>
    <div class="container">
      <div class="hero__content scroll-reveal">
        <p class="hero__date" id="hero-date">Loading...</p>
        <h1 class="hero__greeting" id="hero-greeting">
          Good Morning, <span class="accent">{{USER_NAME}}</span>
        </h1>
        <p class="hero__tagline">Here is your personalized intelligence briefing for today.</p>
      </div>
    </div>
  </header>

  <!-- ==================== Main Briefing ==================== -->
  <main class="briefing" role="main">
    <div class="container">
      <div class="briefing__grid reveal-stagger">

        <!-- ===== Panel 1: Market Snapshot ===== -->
        <section class="scroll-reveal" aria-label="Market Snapshot">
          <div class="section-header">
            <svg class="section-header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
            </svg>
            <h2 class="section-header__title">Market Snapshot</h2>
            <span class="section-header__badge">Live</span>
          </div>
          <div class="market-strip" id="market-strip">
            <!-- Populated by script.js -->
          </div>
        </section>

        <!-- ===== Panel 2: Top News ===== -->
        <section class="card scroll-reveal" aria-label="Top News">
          <div class="section-header">
            <svg class="section-header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/>
            </svg>
            <h2 class="section-header__title">Top Stories</h2>
            <span class="section-header__badge">Hacker News</span>
          </div>
          <div class="news-list" id="news-list">
            <!-- Populated by script.js -->
          </div>
        </section>

        <!-- ===== Panel 3: Daily Quote ===== -->
        <section class="card scroll-reveal" aria-label="Daily Quote">
          <div class="quote-section">
            <span class="quote-section__mark" aria-hidden="true">&ldquo;</span>
            <p class="quote-section__text" id="quote-text">Loading...</p>
            <p class="quote-section__author" id="quote-author"></p>
          </div>
        </section>

        <!-- ===== Panel 4: Today's Tasks ===== -->
        <section class="card scroll-reveal" aria-label="Today's Tasks">
          <div class="section-header">
            <svg class="section-header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            <h2 class="section-header__title">Today's Agenda</h2>
          </div>
          <ul class="todo-list" id="todo-list">
            <!-- Populated by script.js -->
          </ul>
        </section>

        <!-- ===== Panel 5: Quick Links ===== -->
        <section class="scroll-reveal" aria-label="Quick Links">
          <div class="section-header">
            <svg class="section-header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            <h2 class="section-header__title">Quick Links</h2>
          </div>
          <div class="links-grid" id="links-grid">
            <!-- Populated by script.js -->
          </div>
        </section>

      </div>
    </div>
  </main>

  <!-- ==================== Footer ==================== -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <p class="footer__text">
        Curated with <span class="footer__heart" aria-label="love">&hearts;</span> for {{USER_NAME}}
      </p>
    </div>
  </footer>

  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
