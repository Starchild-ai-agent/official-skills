<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Victor Mono (heading + password) + Lexend (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Victor+Mono:wght@400;500;600;700&family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- GSAP 3 + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ─── Top Bar ─── -->
  <header class="top-bar">
    <div class="top-bar__brand">
      <span class="top-bar__logo">⛨</span>
      <span class="top-bar__title">{{APP_TITLE}}</span>
    </div>
    <div class="top-bar__actions">
      <span class="top-bar__user">{{USER_NAME}}</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="theme-toggle__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ─── Hero: H15 Interactive Hero ─── -->
  <section class="hero" id="hero">
    <div class="hero__inner">
      <p class="hero__label">Secure Password Generator</p>
      <h1 class="hero__heading">Generate. Copy. Forget.</h1>
      <div class="hero__password-box gen-panel" id="heroPasswordBox">
        <div class="password-display" id="passwordDisplay">Click Generate</div>
        <div class="password-actions">
          <button class="btn btn--icon" id="copyBtn" title="Copy to clipboard">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
          <button class="btn btn--primary" id="generateBtn">Generate</button>
        </div>
      </div>
      <div class="strength-bar" id="strengthBar">
        <div class="strength-bar__fill" id="strengthFill"></div>
      </div>
      <div class="strength-label" id="strengthLabel">—</div>
    </div>
  </section>

  <!-- ─── Main: A11 Centered Single Column ─── -->
  <main class="main-col" id="mainContent">
    <!-- Options Panel -->
    <section class="gen-panel" id="optionsPanel">
      <h2 class="panel__title">Options</h2>

      <div class="option-row">
        <label class="option-label" for="lengthSlider">Length: <span id="lengthValue">16</span></label>
        <input type="range" id="lengthSlider" class="range-slider" min="6" max="64" value="16" />
      </div>

      <div class="option-toggles">
        <label class="toggle-label">
          <input type="checkbox" id="optUppercase" checked />
          <span class="toggle-switch"></span>
          <span>Uppercase (A-Z)</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="optLowercase" checked />
          <span class="toggle-switch"></span>
          <span>Lowercase (a-z)</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="optNumbers" checked />
          <span class="toggle-switch"></span>
          <span>Numbers (0-9)</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="optSymbols" checked />
          <span class="toggle-switch"></span>
          <span>Symbols (!@#$…)</span>
        </label>
      </div>
    </section>

    <!-- Batch Generate -->
    <section class="gen-panel" id="batchPanel">
      <h2 class="panel__title">Batch Generate</h2>
      <div class="batch-controls">
        <label class="option-label" for="batchCount">Count:</label>
        <input type="number" id="batchCount" class="batch-input" min="2" max="20" value="5" />
        <button class="btn btn--primary" id="batchBtn">Generate Batch</button>
      </div>
      <div class="batch-list" id="batchList">
        <!-- Filled by JS -->
      </div>
    </section>

    <!-- History -->
    <section class="gen-panel" id="historyPanel">
      <h2 class="panel__title">
        History
        <button class="btn btn--small btn--danger" id="clearHistoryBtn">Clear</button>
      </h2>
      <div class="history-list" id="historyList">
        <p class="history-empty" id="historyEmpty">No passwords generated yet</p>
      </div>
    </section>
  </main>

  <!-- ─── Footer ─── -->
  <footer class="site-footer">
    <p>Powered by Web Crypto API · Nothing leaves your browser</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
