<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{APP_TITLE}} — P&L Calculator</title>

  <!-- Fonts: Azeret Mono (heading + data) + Lexend (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- GSAP 3 + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ─── Top Bar ─── -->
  <header class="top-bar">
    <div class="top-bar__brand">
      <span class="top-bar__logo">◈</span>
      <span class="top-bar__title">{{APP_TITLE}}</span>
    </div>
    <div class="top-bar__actions">
      <span class="top-bar__user">{{USER_NAME}}</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="theme-toggle__icon theme-toggle__icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ─── Main Content (Centered Single Column) ─── -->
  <main class="main-col">
    <!-- Hero: Minimal -->
    <section class="hero" id="hero">
      <h1 class="hero__heading">P&L Calculator</h1>
      <p class="hero__sub">Track your trades. Know your edge.</p>
    </section>

    <!-- Trade Input Form -->
    <section class="trade-form-section">
      <form class="trade-entry trade-form" id="tradeForm">
        <h2 class="section-heading">New Trade</h2>
        <div class="trade-form__grid">
          <label class="trade-form__label">
            <span>Token</span>
            <select id="tokenSelect" class="trade-form__input trade-form__select">
              <option value="bitcoin">BTC</option>
              <option value="ethereum">ETH</option>
              <option value="solana">SOL</option>
              <option value="cardano">ADA</option>
              <option value="polkadot">DOT</option>
              <option value="custom">Custom</option>
            </select>
          </label>
          <label class="trade-form__label">
            <span>Buy Price ($)</span>
            <input type="number" id="buyPrice" class="trade-form__input" placeholder="0.00" step="any" min="0" required />
          </label>
          <label class="trade-form__label">
            <span>Sell Price ($)</span>
            <input type="number" id="sellPrice" class="trade-form__input" placeholder="0.00" step="any" min="0" />
          </label>
          <label class="trade-form__label">
            <span>Quantity</span>
            <input type="number" id="quantity" class="trade-form__input" placeholder="0" step="any" min="0" required />
          </label>
          <label class="trade-form__label">
            <span>Fee Rate (%)</span>
            <input type="number" id="feeRate" class="trade-form__input" placeholder="0.1" step="any" min="0" value="0.1" />
          </label>
          <label class="trade-form__label trade-form__label--checkbox">
            <span>Open trade</span>
            <input type="checkbox" id="openTrade" class="trade-form__checkbox" />
            <span class="trade-form__hint">Use live price as sell</span>
          </label>
        </div>
        <button type="submit" class="trade-form__btn">Add Trade</button>
      </form>
    </section>

    <!-- Summary -->
    <section class="summary-section" id="summarySection">
      <div class="summary-row">
        <div class="trade-entry summary-card">
          <span class="summary-card__label">Total Trades</span>
          <span class="summary-card__value" id="totalTrades">0</span>
        </div>
        <div class="trade-entry summary-card">
          <span class="summary-card__label">Total P&L</span>
          <span class="summary-card__value" id="totalPnl">$0.00</span>
        </div>
        <div class="trade-entry summary-card">
          <span class="summary-card__label">Win Rate</span>
          <span class="summary-card__value" id="winRate">—</span>
        </div>
        <div class="trade-entry summary-card">
          <span class="summary-card__label">Best Trade</span>
          <span class="summary-card__value" id="bestTrade">—</span>
        </div>
      </div>
    </section>

    <!-- Trade List -->
    <section class="trades-section" id="tradesSection">
      <h2 class="section-heading">Trade History</h2>
      <div class="trades-list" id="tradesList">
        <p class="trades-empty" id="tradesEmpty">No trades yet. Add your first trade above.</p>
      </div>
    </section>

    <!-- P&L Distribution Chart -->
    <section class="chart-section trade-entry" id="chartSection" style="display:none;">
      <h2 class="section-heading">P&L Distribution</h2>
      <div class="chart-wrap">
        <canvas id="pnlChart"></canvas>
      </div>
    </section>
  </main>

  <!-- ─── Footer ─── -->
  <footer class="site-footer">
    <p>Not financial advice · Built for {{USER_NAME}}</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
