<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Product Hunt Tracker" />
  <title>{{APP_TITLE}}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Figtree:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <!-- ==================== Hero (H2 Compact Stats) ==================== -->
  <header class="hero" role="banner">
    <div class="container">
      <h1 class="hero__title">{{APP_TITLE}}</h1>
      <p class="hero__subtitle">Track trending products and launches</p>
      <div class="hero__stats">
        <div class="hero__stat"><span class="hero__stat-number">24</span><span class="hero__stat-label">Today</span></div>
        <div class="hero__stat"><span class="hero__stat-number">168</span><span class="hero__stat-label">This Week</span></div>
        <div class="hero__stat"><span class="hero__stat-number">12</span><span class="hero__stat-label">Categories</span></div>
      </div>
    </div>
  </header>

  <!-- ==================== Filters ==================== -->
  <section class="section section--filters">
    <div class="container">
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="devtools">Dev Tools</button>
        <button class="filter-btn" data-filter="ai">AI</button>
        <button class="filter-btn" data-filter="saas">SaaS</button>
        <button class="filter-btn" data-filter="design">Design</button>
        <button class="filter-btn" data-filter="productivity">Productivity</button>
      </div>
    </div>
  </section>

  <!-- ==================== Trend Chart ==================== -->
  <section class="section section--chart" id="chart-section">
    <div class="container">
      <h2 class="section__title">Launch Trends</h2>
      <div class="chart-wrapper">
        <canvas id="trend-chart" height="200"></canvas>
      </div>
    </div>
  </section>

  <!-- ==================== Product Grid (Masonry A12) ==================== -->
  <section class="section section--products" id="products-section">
    <div class="container container--wide">
      <h2 class="section__title">Trending Products</h2>
      <div class="masonry-grid" id="product-grid"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p class="footer__text">{{APP_TITLE}} — Discover what's launching next</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
