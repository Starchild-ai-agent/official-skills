<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Clash Display (heading) + Figtree (body) + Fira Code (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet" />

  <!-- QRCode.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>

  <!-- GSAP 3 + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ─── Top Bar ─── -->
  <header class="top-bar">
    <div class="top-bar__brand">
      <span class="top-bar__logo">⬡</span>
      <span class="top-bar__title">{{APP_TITLE}}</span>
    </div>
    <div class="top-bar__actions">
      <span class="top-bar__user">{{USER_NAME}}</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="theme-toggle__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ─── Hero: H7 Minimal Hero ─── -->
  <section class="hero" id="hero">
    <div class="hero__inner">
      <h1 class="hero__heading">QR Code Generator</h1>
      <p class="hero__sub">Create, customize, and download QR codes instantly. No server needed.</p>
    </div>
  </section>

  <!-- ─── Split Screen: A3 ─── -->
  <main class="split" id="splitMain">
    <!-- Left: Input Panel -->
    <div class="split__left">
      <!-- Preset Tabs -->
      <section class="qr-panel" id="presetPanel">
        <h2 class="panel__title">Type</h2>
        <div class="preset-tabs">
          <button class="preset-tab preset-tab--active" data-preset="url">URL</button>
          <button class="preset-tab" data-preset="text">Text</button>
          <button class="preset-tab" data-preset="wifi">WiFi</button>
          <button class="preset-tab" data-preset="vcard">vCard</button>
        </div>
      </section>

      <!-- Input Panel -->
      <section class="qr-panel" id="inputPanel">
        <h2 class="panel__title">Content</h2>

        <!-- URL input -->
        <div class="input-group" id="inputUrl">
          <label class="input-label" for="qrUrl">URL</label>
          <input type="url" id="qrUrl" class="input-field" placeholder="https://example.com" value="https://example.com" />
        </div>

        <!-- Text input -->
        <div class="input-group input-group--hidden" id="inputText">
          <label class="input-label" for="qrText">Text</label>
          <textarea id="qrText" class="input-field input-field--textarea" placeholder="Enter your text…" rows="4"></textarea>
        </div>

        <!-- WiFi input -->
        <div class="input-group input-group--hidden" id="inputWifi">
          <label class="input-label" for="wifiSsid">Network Name (SSID)</label>
          <input type="text" id="wifiSsid" class="input-field" placeholder="MyNetwork" />
          <label class="input-label" for="wifiPass">Password</label>
          <input type="text" id="wifiPass" class="input-field" placeholder="password123" />
          <label class="input-label" for="wifiEnc">Encryption</label>
          <select id="wifiEnc" class="input-field input-field--select">
            <option value="WPA">WPA/WPA2</option>
            <option value="WEP">WEP</option>
            <option value="nopass">None</option>
          </select>
        </div>

        <!-- vCard input -->
        <div class="input-group input-group--hidden" id="inputVcard">
          <label class="input-label" for="vcardName">Full Name</label>
          <input type="text" id="vcardName" class="input-field" placeholder="John Doe" />
          <label class="input-label" for="vcardPhone">Phone</label>
          <input type="tel" id="vcardPhone" class="input-field" placeholder="+1234567890" />
          <label class="input-label" for="vcardEmail">Email</label>
          <input type="email" id="vcardEmail" class="input-field" placeholder="john@example.com" />
          <label class="input-label" for="vcardOrg">Organization</label>
          <input type="text" id="vcardOrg" class="input-field" placeholder="Acme Inc." />
        </div>
      </section>

      <!-- Style Options -->
      <section class="qr-panel" id="stylePanel">
        <h2 class="panel__title">Style</h2>
        <div class="style-grid">
          <div class="style-item">
            <label class="input-label" for="qrFgColor">Foreground</label>
            <div class="color-row">
              <input type="color" id="qrFgColor" class="color-picker" value="#1a1a1a" />
              <span class="color-hex" id="fgHex">#1a1a1a</span>
            </div>
          </div>
          <div class="style-item">
            <label class="input-label" for="qrBgColor">Background</label>
            <div class="color-row">
              <input type="color" id="qrBgColor" class="color-picker" value="#ffffff" />
              <span class="color-hex" id="bgHex">#ffffff</span>
            </div>
          </div>
          <div class="style-item">
            <label class="input-label" for="qrEcc">Error Correction</label>
            <select id="qrEcc" class="input-field input-field--select">
              <option value="L">Low (7%)</option>
              <option value="M" selected>Medium (15%)</option>
              <option value="Q">Quartile (25%)</option>
              <option value="H">High (30%)</option>
            </select>
          </div>
          <div class="style-item">
            <label class="input-label" for="qrSize">Size</label>
            <select id="qrSize" class="input-field input-field--select">
              <option value="200">200 × 200</option>
              <option value="300" selected>300 × 300</option>
              <option value="400">400 × 400</option>
              <option value="600">600 × 600</option>
            </select>
          </div>
        </div>
      </section>
    </div>

    <!-- Right: QR Preview -->
    <div class="split__right">
      <section class="qr-panel qr-preview-panel" id="previewPanel">
        <h2 class="panel__title">Preview</h2>
        <div class="qr-preview" id="qrPreview">
          <canvas id="qrCanvas"></canvas>
        </div>
        <div class="qr-actions">
          <button class="btn btn--primary btn--lg" id="downloadBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download PNG
          </button>
        </div>
        <div class="qr-data-preview">
          <p class="qr-data-label">Encoded data:</p>
          <code class="qr-data-code" id="qrDataCode">https://example.com</code>
        </div>
      </section>
    </div>
  </main>

  <!-- ─── Footer ─── -->
  <footer class="site-footer">
    <p>Powered by qrcode.js · Everything runs in your browser</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
