<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Quick Notes" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Azeret Mono (heading) + Lexend (body) + Fira Code (editor) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&family=Lexend:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Marked.js for Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

  <!-- Prism.js for syntax highlighting -->
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <!-- Layout: A3 Split Screen -->
  <div class="app-split">
    <!-- Left Panel: Note List -->
    <aside class="list-panel" id="listPanel">
      <!-- H7 Minimal Hero -->
      <header class="list-header" data-animate="slide">
        <h1 class="list-title">{{APP_TITLE}}</h1>
        <p class="list-sub">{{USER_NAME}}</p>
      </header>

      <!-- Search -->
      <div class="list-search" data-animate="slide">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search notes…" autocomplete="off" />
      </div>

      <!-- Actions -->
      <div class="list-actions" data-animate="slide">
        <button class="btn btn-new" id="btnNew">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Note
        </button>
      </div>

      <!-- Note Items -->
      <div class="note-list" id="noteList"></div>
      <p class="list-empty" id="listEmpty">No notes yet. Create your first note!</p>
    </aside>

    <!-- Mobile List Toggle -->
    <button class="list-toggle" id="listToggle" aria-label="Toggle note list">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
    </button>

    <!-- Right Panel: Editor -->
    <main class="editor-panel" id="editorPanel">
      <!-- Editor Toolbar -->
      <div class="editor-toolbar" id="editorToolbar">
        <div class="toolbar-left">
          <span class="toolbar-title" id="toolbarTitle">Untitled</span>
          <span class="toolbar-saved" id="toolbarSaved"></span>
        </div>
        <div class="toolbar-right">
          <button class="toolbar-btn" id="btnPreview" aria-label="Toggle preview">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Preview
          </button>
          <button class="toolbar-btn" id="btnExport" aria-label="Export markdown">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
          </button>
          <button class="toolbar-btn danger" id="btnDelete" aria-label="Delete note">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>

      <!-- Editor Area -->
      <div class="editor-body">
        <textarea class="editor-textarea" id="editorTextarea" placeholder="Start writing in Markdown…" spellcheck="false"></textarea>
        <div class="editor-preview hidden" id="editorPreview"></div>
      </div>

      <!-- Empty State -->
      <div class="editor-empty" id="editorEmpty">
        <div class="editor-empty-icon">📝</div>
        <p>Select a note or create a new one</p>
        <p class="editor-empty-hint">Ctrl+S to save · Markdown supported</p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
