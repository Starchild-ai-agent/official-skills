<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Regex Pattern Tester" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Recursive (heading + code) + Figtree (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Recursive:wght@400;500;600;700;800&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Noise texture overlay -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- ==================== Theme Toggle ==================== -->
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ==================== Hero: Tool Hero (H9) ==================== -->
  <header class="hero" role="banner">
    <div class="hero__bg-image" aria-hidden="true"></div>
    <div class="container hero__container">
      <div class="hero__top-bar">
        <h1 class="hero__title">{{APP_TITLE}}</h1>
        <time class="hero__time" id="hero-time" datetime="">Loading...</time>
      </div>

      <!-- Large regex input as hero core -->
      <div class="tool-panel tool-panel--hero">
        <div class="tool-panel__regex-row">
          <span class="regex-delimiter">/</span>
          <input type="text" id="regex-input" class="regex-field" placeholder="Enter regex pattern..." autocomplete="off" spellcheck="false" />
          <span class="regex-delimiter">/</span>
          <div class="regex-flags" id="regex-flags">
            <button class="flag-btn active" data-flag="g" title="Global">g</button>
            <button class="flag-btn active" data-flag="i" title="Case Insensitive">i</button>
            <button class="flag-btn" data-flag="m" title="Multiline">m</button>
            <button class="flag-btn" data-flag="s" title="Dotall">s</button>
            <button class="flag-btn" data-flag="u" title="Unicode">u</button>
          </div>
        </div>
        <div class="tool-panel__match-bar">
          <span class="tool-panel__match-count"><span id="match-count">0</span> matches</span>
          <div class="tool-panel__error" id="regex-error" role="alert"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- ==================== Test String (Tool Panel) ==================== -->
  <section class="section section--test" id="section-test">
    <div class="container">
      <div class="tool-panel">
        <div class="tool-panel__header">
          <span class="tool-panel__label">Test String</span>
        </div>
        <div class="test-area">
          <div class="test-area__highlight" id="highlight-layer" aria-hidden="true"></div>
          <textarea id="test-string" class="test-area__input" rows="6" placeholder="Type or paste your test string here..." spellcheck="false"></textarea>
        </div>
      </div>
    </div>
  </section>

  <!-- ==================== Match Results (Table-First) ==================== -->
  <section class="section section--results" id="section-results">
    <div class="container">
      <div class="section__header">
        <span class="section__tag">Results</span>
        <h2 class="section__title">Match Results</h2>
      </div>
      <div class="results-grid" id="results-grid">
        <div class="results-empty" id="results-empty">
          <div class="results-empty__icon">⌘</div>
          <p>Enter a regex pattern and test string to see results</p>
        </div>
      </div>
    </div>
  </section>

  <!-- ==================== Common Patterns ==================== -->
  <section class="section section--patterns" id="section-patterns">
    <div class="container">
      <div class="section__header">
        <span class="section__tag">Library</span>
        <h2 class="section__title">Common Patterns</h2>
      </div>
      <div class="patterns-grid" id="patterns-grid"></div>
    </div>
  </section>

  <!-- ==================== Cheatsheet ==================== -->
  <section class="section section--cheatsheet" id="section-cheatsheet">
    <div class="container">
      <div class="section__header">
        <span class="section__tag">Reference</span>
        <h2 class="section__title">Quick Reference</h2>
      </div>
      <div class="cheatsheet-grid" id="cheatsheet-grid"></div>
    </div>
  </section>

  <!-- ==================== Footer ==================== -->
  <footer class="footer">
    <div class="container footer__container">
      <p class="footer__text">{{APP_TITLE}} · Built for developers</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
