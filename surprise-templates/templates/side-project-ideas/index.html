<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Side Project Idea Generator" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Fredoka (display) + Nunito (body) + Space Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <!-- ==================== Hero (H15 Interactive) ==================== -->
  <header class="hero" role="banner">
    <div class="container hero__container">
      <h1 class="hero__title">{{APP_TITLE}}</h1>
      <p class="hero__subtitle">Stuck on what to build? Let us spark your next idea.</p>
      <button class="hero__generate-btn" id="generate-btn" type="button">
        <span class="hero__generate-icon" aria-hidden="true">&#x1F3B2;</span>
        Generate Idea
      </button>
    </div>
  </header>

  <!-- ==================== Current Idea (Centered A11) ==================== -->
  <section class="section section--idea" id="idea-section">
    <div class="container">
      <div class="idea-card" id="idea-card">
        <div class="idea-card__empty">Press the button to generate an idea</div>
      </div>
    </div>
  </section>

  <!-- ==================== Saved Ideas ==================== -->
  <section class="section section--saved" id="saved-section">
    <div class="container">
      <h2 class="section__title">Saved Ideas</h2>
      <p class="section__desc">Your collection of project inspirations</p>
      <div class="saved-grid" id="saved-grid">
        <p class="saved-empty">No saved ideas yet. Generate and save some!</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p class="footer__text">{{APP_TITLE}} — Every great product started as a side project</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
