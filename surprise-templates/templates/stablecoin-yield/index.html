<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Stablecoin yield comparison across DeFi protocols" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Nunito (headings) + Karla (body) + IBM Plex Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Karla:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ==================== Hero: H5 KPI Bar ==================== -->
  <header class="hero" role="banner">
    <div class="container">
      <p class="hero__label">Stablecoin Yield Tracker</p>
      <h1 class="hero__title">Earn More on <span class="hero__accent">Stables</span></h1>
      <div class="hero__kpi-bar">
        <div class="kpi-item">
          <span class="kpi-item__value" id="kpi-avg-apy">—</span>
          <span class="kpi-item__label">Avg APY</span>
        </div>
        <div class="kpi-item">
          <span class="kpi-item__value" id="kpi-best-apy">—</span>
          <span class="kpi-item__label">Best APY</span>
        </div>
        <div class="kpi-item">
          <span class="kpi-item__value" id="kpi-total-tvl">—</span>
          <span class="kpi-item__label">Total TVL</span>
        </div>
        <div class="kpi-item">
          <span class="kpi-item__value" id="kpi-protocols">—</span>
          <span class="kpi-item__label">Protocols</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ==================== Filter Bar ==================== -->
  <section class="section" id="filters">
    <div class="container">
      <div class="filter-bar">
        <button class="filter-btn filter-btn--active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="USDC">USDC</button>
        <button class="filter-btn" data-filter="USDT">USDT</button>
        <button class="filter-btn" data-filter="DAI">DAI</button>
        <button class="filter-btn" data-filter="FRAX">FRAX</button>
      </div>
    </div>
  </section>

  <!-- ==================== Yield Table (A7 Table-First) ==================== -->
  <section class="section" id="yield-table">
    <div class="container">
      <h2 class="section__title">Yield Rankings</h2>
      <div class="table-wrap">
        <table class="yield-tbl" id="yields-table">
          <thead>
            <tr>
              <th data-sort="protocol">Protocol</th>
              <th data-sort="token">Token</th>
              <th data-sort="chain">Chain</th>
              <th data-sort="apy" class="sort-active">APY ↓</th>
              <th data-sort="tvl">TVL</th>
              <th data-sort="risk">Risk</th>
            </tr>
          </thead>
          <tbody id="yields-tbody">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ==================== APY Comparison Chart ==================== -->
  <section class="section" id="apy-chart-section">
    <div class="container">
      <h2 class="section__title">APY Comparison</h2>
      <div class="chart-container">
        <canvas id="apy-chart"></canvas>
      </div>
    </div>
  </section>

  <!-- ==================== TVL Distribution ==================== -->
  <section class="section" id="tvl-section">
    <div class="container">
      <h2 class="section__title">TVL Distribution</h2>
      <div class="chart-grid">
        <div class="chart-container chart-container--half">
          <h3 class="chart-container__subtitle">By Stablecoin</h3>
          <canvas id="tvl-token-chart"></canvas>
        </div>
        <div class="chart-container chart-container--half">
          <h3 class="chart-container__subtitle">By Chain</h3>
          <canvas id="tvl-chain-chart"></canvas>
        </div>
      </div>
    </div>
  </section>

  <!-- ==================== Footer ==================== -->
  <footer class="footer">
    <div class="container">
      <p class="footer__text">Data from DeFi Llama · Updated every 5 minutes</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
