<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Tax Estimator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Karla:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="theme-toggle__icon theme-toggle__icon--light">☀</span>
    <span class="theme-toggle__icon theme-toggle__icon--dark">☾</span>
  </button>

  <div class="app">
    <!-- KPI Bar Hero -->
    <header class="hero">
      <h1 class="hero__title">Tax Estimator</h1>
      <p class="hero__subtitle">Estimate your crypto capital gains tax</p>
      <div class="kpi-bar" id="kpiBar">
        <div class="kpi">
          <span class="kpi__label">Total Gains</span>
          <span class="kpi__value" id="kpiGains">$0.00</span>
        </div>
        <div class="kpi">
          <span class="kpi__label">Total Losses</span>
          <span class="kpi__value kpi__value--loss" id="kpiLosses">$0.00</span>
        </div>
        <div class="kpi">
          <span class="kpi__label">Net Taxable</span>
          <span class="kpi__value kpi__value--net" id="kpiNet">$0.00</span>
        </div>
        <div class="kpi">
          <span class="kpi__label">Est. Tax</span>
          <span class="kpi__value kpi__value--tax" id="kpiTax">$0.00</span>
        </div>
      </div>
    </header>

    <!-- Tax Settings -->
    <section class="settings">
      <div class="settings__row">
        <div class="settings__field">
          <label class="settings__label" for="country">Country / Region</label>
          <select class="settings__select" id="country">
            <option value="us">United States (15-37%)</option>
            <option value="uk">United Kingdom (10-20%)</option>
            <option value="de">Germany (0-45%)</option>
            <option value="jp">Japan (15-55%)</option>
            <option value="au">Australia (0-45%)</option>
            <option value="sg">Singapore (0%)</option>
            <option value="custom">Custom Rate</option>
          </select>
        </div>
        <div class="settings__field settings__field--small">
          <label class="settings__label" for="taxRate">Tax Rate %</label>
          <input class="settings__input" type="number" id="taxRate" value="20" min="0" max="100" step="0.5" />
        </div>
      </div>
    </section>

    <!-- Transaction Input -->
    <section class="tx-form">
      <h2 class="section-title">Add Transaction</h2>
      <div class="tx-form__grid">
        <div class="tx-form__field">
          <label class="tx-form__label" for="txAsset">Asset</label>
          <input class="tx-form__input" type="text" id="txAsset" placeholder="BTC" />
        </div>
        <div class="tx-form__field">
          <label class="tx-form__label" for="txBuyPrice">Buy Price ($)</label>
          <input class="tx-form__input" type="number" id="txBuyPrice" placeholder="30000" step="any" />
        </div>
        <div class="tx-form__field">
          <label class="tx-form__label" for="txSellPrice">Sell Price ($)</label>
          <input class="tx-form__input" type="number" id="txSellPrice" placeholder="45000" step="any" />
        </div>
        <div class="tx-form__field">
          <label class="tx-form__label" for="txAmount">Amount</label>
          <input class="tx-form__input" type="number" id="txAmount" placeholder="0.5" step="any" />
        </div>
        <div class="tx-form__field">
          <label class="tx-form__label" for="txDate">Date</label>
          <input class="tx-form__input" type="date" id="txDate" />
        </div>
        <div class="tx-form__field tx-form__field--action">
          <button class="tx-form__btn" id="addTx">Add Transaction</button>
        </div>
      </div>
    </section>

    <!-- Transaction Table -->
    <section class="tx-table">
      <h2 class="section-title">Transactions</h2>
      <div class="table-wrap">
        <table class="table" id="txTable">
          <thead>
            <tr>
              <th>Asset</th>
              <th>Amount</th>
              <th>Buy</th>
              <th>Sell</th>
              <th>Gain/Loss</th>
              <th>Date</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="txBody">
            <tr class="table__empty"><td colspan="7">No transactions added</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Chart -->
    <section class="chart-section">
      <h2 class="section-title">Tax Breakdown</h2>
      <div class="chart-wrap">
        <canvas id="taxChart" width="300" height="300"></canvas>
      </div>
    </section>

    <!-- Report Summary -->
    <section class="report" id="report">
      <h2 class="section-title">Tax Report Summary</h2>
      <div class="report__grid" id="reportGrid">
        <p class="report__empty">Add transactions to generate report</p>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
