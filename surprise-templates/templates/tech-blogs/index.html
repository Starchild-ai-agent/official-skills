<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Tech Blog Aggregator" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Lora (display) + Source Sans 3 (body) + Fira Code (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <!-- ==================== Hero (H12 Alert Banner) ==================== -->
  <header class="hero" role="banner">
    <div class="container">
      <div class="hero__banner">
        <span class="hero__banner-dot" aria-hidden="true"></span>
        <span class="hero__banner-text">12 new articles today</span>
      </div>
      <h1 class="hero__title">{{APP_TITLE}}</h1>
      <p class="hero__subtitle">Curated tech articles from across the web</p>
    </div>
  </header>

  <!-- ==================== Category Tabs ==================== -->
  <section class="section section--tabs">
    <div class="container">
      <div class="category-tabs" id="category-tabs">
        <button class="cat-tab active" data-cat="all">All</button>
        <button class="cat-tab" data-cat="frontend">Frontend</button>
        <button class="cat-tab" data-cat="backend">Backend</button>
        <button class="cat-tab" data-cat="devops">DevOps</button>
        <button class="cat-tab" data-cat="ai">AI</button>
        <button class="cat-tab" data-cat="bookmarks">Bookmarks</button>
      </div>
    </div>
  </section>

  <!-- ==================== Feed ==================== -->
  <section class="section section--feed" id="feed-section">
    <div class="container">
      <div class="feed" id="feed-list"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p class="footer__text">{{APP_TITLE}} — Stay informed, stay ahead</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
