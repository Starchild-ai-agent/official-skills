<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Tech Conference Finder" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Urbanist (display) + Figtree (body) + JetBrains Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <!-- ==================== Hero (H13 Countdown) ==================== -->
  <header class="hero" role="banner">
    <div class="container hero__container">
      <span class="hero__label">Next Conference In</span>
      <div class="hero__countdown" id="countdown">
        <div class="countdown__unit"><span class="countdown__number" id="cd-days">--</span><span class="countdown__label">Days</span></div>
        <div class="countdown__sep">:</div>
        <div class="countdown__unit"><span class="countdown__number" id="cd-hours">--</span><span class="countdown__label">Hours</span></div>
        <div class="countdown__sep">:</div>
        <div class="countdown__unit"><span class="countdown__number" id="cd-mins">--</span><span class="countdown__label">Min</span></div>
        <div class="countdown__sep">:</div>
        <div class="countdown__unit"><span class="countdown__number" id="cd-secs">--</span><span class="countdown__label">Sec</span></div>
      </div>
      <h1 class="hero__title">{{APP_TITLE}}</h1>
      <p class="hero__subtitle">Discover upcoming tech conferences worldwide</p>
    </div>
  </header>

  <!-- ==================== Filters ==================== -->
  <section class="section section--filters">
    <div class="container">
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="online">Online</button>
        <button class="filter-btn" data-filter="offline">In-Person</button>
        <button class="filter-btn" data-filter="ai">AI/ML</button>
        <button class="filter-btn" data-filter="web">Web</button>
        <button class="filter-btn" data-filter="devops">DevOps</button>
      </div>
    </div>
  </section>

  <!-- ==================== Calendar View ==================== -->
  <section class="section section--calendar" id="calendar-section">
    <div class="container">
      <h2 class="section__title">Calendar</h2>
      <div class="calendar">
        <div class="calendar__header">
          <button class="calendar__nav" id="cal-prev" type="button" aria-label="Previous month">&larr;</button>
          <span class="calendar__month" id="cal-month"></span>
          <button class="calendar__nav" id="cal-next" type="button" aria-label="Next month">&rarr;</button>
        </div>
        <div class="calendar__weekdays">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="calendar__grid" id="cal-grid"></div>
      </div>
    </div>
  </section>

  <!-- ==================== Conference List ==================== -->
  <section class="section section--list" id="conf-list-section">
    <div class="container">
      <h2 class="section__title">Upcoming Conferences</h2>
      <div class="conf-list" id="conf-list"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p class="footer__text">{{APP_TITLE}} — Never miss a tech event</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
