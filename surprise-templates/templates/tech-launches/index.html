<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Tech Product Launch Feed" />
  <title>{{APP_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise-overlay" aria-hidden="true"></div>
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <!-- Hero (H2 Compact Stats) -->
  <header class="hero" role="banner">
    <div class="container hero__container">
      <p class="hero__label">Tech Product Launch Feed</p>
      <h1 class="hero__title">Today's Best<br/>Product Launches</h1>
      <p class="hero__subtitle">Curated from Product Hunt and Hacker News. Discover what's shipping today.</p>
      <div class="hero__stats">
        <div class="hero__stat"><span class="hero__stat-value" id="stat-total">18</span><span class="hero__stat-label">Launches Today</span></div>
        <div class="hero__stat"><span class="hero__stat-value" id="stat-ph">12</span><span class="hero__stat-label">Product Hunt</span></div>
        <div class="hero__stat"><span class="hero__stat-value" id="stat-hn">6</span><span class="hero__stat-label">Hacker News</span></div>
      </div>
    </div>
  </header>

  <!-- Filters -->
  <section class="section" id="filters">
    <div class="container">
      <div class="filter-tabs" id="filter-tabs"></div>
    </div>
  </section>

  <!-- Product Grid (A12 Masonry) -->
  <section class="section" id="products">
    <div class="container">
      <div class="product-grid" id="product-grid"></div>
    </div>
  </section>

  <footer class="footer"><div class="container"><p class="footer__text">Tech Product Launch Feed — Built with mock data</p></div></footer>
  <script src="script.js"></script>
</body>
</html>
