<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Your personalized tech stack trend radar" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Fraunces (editorial headings) + Geist (body) + Geist Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,400&family=Geist+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==================== Theme Toggle ==================== -->
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ==================== Masthead (Newspaper-style) ==================== -->
  <header class="masthead" role="banner">
    <div class="container">
      <div class="masthead__rule" aria-hidden="true"></div>
      <div class="masthead__meta">
        <time class="masthead__date" id="masthead-date">Loading...</time>
        <span class="masthead__edition">Personal Edition</span>
      </div>
      <h1 class="masthead__title">{{APP_TITLE}}</h1>
      <p class="masthead__tagline">Curated for <strong>{{USER_NAME}}</strong> — tracking what matters in your stack</p>
      <div class="masthead__rule masthead__rule--thin" aria-hidden="true"></div>
    </div>
  </header>

  <!-- ==================== Main Content ==================== -->
  <main class="content" role="main">
    <div class="container">

      <!-- ===== Lead Story: GitHub Trending ===== -->
      <section class="section section--lead" aria-label="Trending Repositories">
        <div class="section__header">
          <h2 class="section__title">
            <svg class="section__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
              <path d="M9 18c-4.51 2-5-2-7-2"/>
            </svg>
            Trending Now
          </h2>
          <span class="section__badge">GitHub</span>
        </div>
        <div class="trending-grid" id="trending-repos">
          <!-- Populated by script.js -->
        </div>
      </section>

      <!-- ===== Two-Column Split ===== -->
      <div class="split">

        <!-- Left Column: Hacker News -->
        <section class="section section--hn" aria-label="Hacker News Top Stories">
          <div class="section__header">
            <h2 class="section__title">
              <svg class="section__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/>
                <path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/>
              </svg>
              Top Stories
            </h2>
            <span class="section__badge">Hacker News</span>
          </div>
          <ol class="hn-list" id="hn-stories">
            <!-- Populated by script.js -->
          </ol>
        </section>

        <!-- Right Column: Language Stats + Your Stack -->
        <aside class="section section--sidebar" aria-label="Stack Analysis">
          <!-- Language Popularity Chart -->
          <div class="sidebar-card" aria-label="Language Trends">
            <h3 class="sidebar-card__title">
              <svg class="sidebar-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>
              </svg>
              Language Trends
            </h3>
            <div class="chart-container" style="height: 220px; position: relative;">
              <canvas id="lang-chart" aria-label="Programming language popularity chart" role="img"></canvas>
            </div>
          </div>

          <!-- Your Stack -->
          <div class="sidebar-card" aria-label="Your Tech Stack">
            <h3 class="sidebar-card__title">
              <svg class="sidebar-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/>
              </svg>
              Your Stack
            </h3>
            <div class="stack-tags" id="stack-tags">
              <!-- Populated by script.js -->
            </div>
          </div>

          <!-- Dev Quote -->
          <blockquote class="pull-quote" id="dev-quote">
            <p class="pull-quote__text">Loading...</p>
            <cite class="pull-quote__cite">—</cite>
          </blockquote>
        </aside>
      </div>

      <!-- ===== Full-Width: GitHub User Stats (if available) ===== -->
      <section class="section section--stats" aria-label="GitHub Profile" id="github-section" style="display:none">
        <div class="section__header">
          <h2 class="section__title">
            <svg class="section__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Your GitHub
          </h2>
          <span class="section__badge" id="github-handle">@username</span>
        </div>
        <div class="github-stats" id="github-stats">
          <!-- Populated by script.js -->
        </div>
      </section>

    </div>
  </main>

  <!-- ==================== Footer ==================== -->
  <footer class="footer" role="contentinfo">
    <div class="container footer__container">
      <div class="footer__rule" aria-hidden="true"></div>
      <p class="footer__text">
        Data by <a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a>,
        <a href="https://news.ycombinator.com" target="_blank" rel="noopener noreferrer">Hacker News</a>
      </p>
      <p class="footer__text footer__text--mono">Updated on page load &middot; No auto-refresh</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
