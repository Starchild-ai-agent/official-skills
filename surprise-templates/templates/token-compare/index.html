<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{APP_TITLE}} — Token Compare</title>

  <!-- Fonts: Sora (heading) + Figtree (body) + JetBrains Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- GSAP 3 + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ─── Top Bar ─── -->
  <header class="top-bar">
    <div class="top-bar__brand">
      <span class="top-bar__logo">⬢</span>
      <span class="top-bar__title">{{APP_TITLE}}</span>
    </div>
    <div class="top-bar__actions">
      <span class="top-bar__user">{{USER_NAME}}</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="theme-toggle__icon theme-toggle__icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ─── Hero: Comparison Selector ─── -->
  <section class="hero" id="hero">
    <h1 class="hero__heading">Token Compare</h1>
    <p class="hero__sub">Side-by-side analysis of any two tokens</p>
    <div class="hero__selectors">
      <div class="hero__selector">
        <label class="hero__label">Token A</label>
        <select id="tokenA" class="hero__select">
          <option value="bitcoin">Bitcoin (BTC)</option>
          <option value="ethereum">Ethereum (ETH)</option>
          <option value="solana">Solana (SOL)</option>
          <option value="cardano">Cardano (ADA)</option>
          <option value="polkadot">Polkadot (DOT)</option>
          <option value="avalanche-2">Avalanche (AVAX)</option>
          <option value="chainlink">Chainlink (LINK)</option>
          <option value="uniswap">Uniswap (UNI)</option>
        </select>
      </div>
      <div class="hero__vs">VS</div>
      <div class="hero__selector">
        <label class="hero__label">Token B</label>
        <select id="tokenB" class="hero__select">
          <option value="ethereum" selected>Ethereum (ETH)</option>
          <option value="bitcoin">Bitcoin (BTC)</option>
          <option value="solana">Solana (SOL)</option>
          <option value="cardano">Cardano (ADA)</option>
          <option value="polkadot">Polkadot (DOT)</option>
          <option value="avalanche-2">Avalanche (AVAX)</option>
          <option value="chainlink">Chainlink (LINK)</option>
          <option value="uniswap">Uniswap (UNI)</option>
        </select>
      </div>
    </div>
    <button class="hero__btn" id="compareBtn">Compare</button>
  </section>

  <!-- ─── Comparison Content ─── -->
  <main class="compare-main" id="compareMain" style="display:none;">
    <!-- Side-by-side panels -->
    <section class="compare-panels">
      <div class="compare-col" id="colA" data-anim="slide-right">
        <div class="compare-col__header">
          <h2 class="compare-col__name" id="nameA">—</h2>
          <span class="compare-col__symbol" id="symbolA">—</span>
        </div>
        <div class="compare-col__price" id="priceA">—</div>
        <div class="compare-col__change" id="changeA">—</div>
        <dl class="compare-col__stats" id="statsA"></dl>
      </div>

      <div class="compare-col" id="colB" data-anim="slide-right">
        <div class="compare-col__header">
          <h2 class="compare-col__name" id="nameB">—</h2>
          <span class="compare-col__symbol" id="symbolB">—</span>
        </div>
        <div class="compare-col__price" id="priceB">—</div>
        <div class="compare-col__change" id="changeB">—</div>
        <dl class="compare-col__stats" id="statsB"></dl>
      </div>
    </section>

    <!-- Price Chart -->
    <section class="chart-section compare-col" data-anim="slide-right">
      <h2 class="section-heading">Price Trend (30d)</h2>
      <div class="chart-wrap">
        <canvas id="priceChart"></canvas>
      </div>
    </section>

    <!-- Metrics Comparison Table -->
    <section class="metrics-section compare-col" data-anim="slide-right">
      <h2 class="section-heading">Key Metrics</h2>
      <div class="table-scroll">
        <table class="metrics-table" id="metricsTable">
          <thead>
            <tr>
              <th>Metric</th>
              <th id="thA">Token A</th>
              <th id="thB">Token B</th>
              <th>Winner</th>
            </tr>
          </thead>
          <tbody id="metricsBody"></tbody>
        </table>
      </div>
    </section>

    <!-- Community Data -->
    <section class="community-section compare-col" data-anim="slide-right">
      <h2 class="section-heading">Community & Social</h2>
      <div class="community-grid" id="communityGrid"></div>
    </section>
  </main>

  <!-- ─── Footer ─── -->
  <footer class="site-footer">
    <p>Data from CoinGecko · Not financial advice · Built for {{USER_NAME}}</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
