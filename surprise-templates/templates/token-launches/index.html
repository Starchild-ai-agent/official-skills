<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Token Launch Tracker" />
  <title>{{APP_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise-overlay" aria-hidden="true"></div>
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <!-- Hero (H5 KPI Bar) -->
  <header class="hero" role="banner">
    <div class="container hero__container">
      <p class="hero__label">Token Launch Tracker</p>
      <h1 class="hero__title">Upcoming<br/>Token Launches</h1>
      <p class="hero__subtitle">Track IDOs, token sales, and project launches with risk ratings and countdowns.</p>
      <div class="hero__kpi-bar" id="kpi-bar"></div>
    </div>
  </header>

  <!-- Filters -->
  <section class="section" id="filters">
    <div class="container">
      <div class="filter-row">
        <div class="filter-tabs" id="filter-tabs"></div>
        <select class="sort-select" id="sort-select">
          <option value="date">By Date</option>
          <option value="raise">By Raise Amount</option>
          <option value="risk">By Risk</option>
        </select>
      </div>
    </div>
  </section>

  <!-- Launch Table (A7 Table-First) -->
  <section class="section" id="launch-table-section">
    <div class="container">
      <div class="table-wrap">
        <table class="launch-table" id="launch-table"></table>
      </div>
    </div>
  </section>

  <footer class="footer"><div class="container"><p class="footer__text">Token Launch Tracker — Built with mock data</p></div></footer>
  <script src="script.js"></script>
</body>
</html>
