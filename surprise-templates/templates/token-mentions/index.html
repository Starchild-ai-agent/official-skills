<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Token Mentions Tracker" />
  <title>{{APP_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Albert+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise-overlay" aria-hidden="true"></div>
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <!-- Hero (H9 Gauge) -->
  <header class="hero" role="banner">
    <div class="container hero__container">
      <p class="hero__label">Token Mentions Tracker</p>
      <h1 class="hero__title">Track What<br/>KOLs Talk About</h1>
      <p class="hero__subtitle">Monitor token mention frequency, KOL activity, and sentiment across crypto Twitter.</p>
      <div class="hero__gauges" id="hero-gauges"></div>
    </div>
  </header>

  <!-- Dashboard (A9 3-col) -->
  <section class="section" id="dashboard">
    <div class="container">
      <div class="dashboard-grid">
        <div class="dashboard-col">
          <h2 class="section__title">Mention Ranking</h2>
          <div class="ranking-list" id="ranking-list"></div>
        </div>
        <div class="dashboard-col dashboard-col--wide">
          <h2 class="section__title">Trend (7d)</h2>
          <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
        </div>
        <div class="dashboard-col">
          <h2 class="section__title">Sentiment</h2>
          <div class="chart-wrap chart-wrap--sm"><canvas id="sentiment-chart"></canvas></div>
          <div class="sentiment-legend" id="sentiment-legend"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- KOL Timeline -->
  <section class="section" id="kol-timeline">
    <div class="container">
      <h2 class="section__title">KOL Mentions Timeline</h2>
      <div class="kol-list" id="kol-list"></div>
    </div>
  </section>

  <footer class="footer"><div class="container"><p class="footer__text">Token Mentions Tracker — Built with mock data</p></div></footer>
  <script src="script.js"></script>
</body>
</html>
