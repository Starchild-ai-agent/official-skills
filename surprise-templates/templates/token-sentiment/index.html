<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{APP_TITLE}} — Token sentiment indicators and mood analysis" />
  <title>{{APP_TITLE}}</title>

  <!-- Fonts: Sora (headings) + Albert Sans (body) + Space Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Albert+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ==================== Hero: H9 Gauge Hero ==================== -->
  <header class="hero" role="banner">
    <div class="container">
      <p class="hero__label">Sentiment Analysis</p>
      <h1 class="hero__title">Market <span class="hero__accent">Mood</span></h1>
      <div class="hero__gauge-wrap">
        <div class="gauge" id="main-gauge">
          <svg class="gauge__svg" viewBox="0 0 200 120">
            <path class="gauge__track" d="M20 100 A80 80 0 0 1 180 100" fill="none" stroke-width="12" stroke-linecap="round"/>
            <path class="gauge__fill" id="gauge-fill" d="M20 100 A80 80 0 0 1 180 100" fill="none" stroke-width="12" stroke-linecap="round"/>
            <text class="gauge__value" id="gauge-value" x="100" y="85" text-anchor="middle" font-size="28" font-weight="800">—</text>
            <text class="gauge__label-text" id="gauge-label" x="100" y="108" text-anchor="middle" font-size="11">Loading...</text>
          </svg>
        </div>
        <p class="hero__gauge-desc">Fear & Greed Index — Overall Market</p>
      </div>
    </div>
  </header>

  <!-- ==================== Token Sentiment Grid (A9 Dashboard 3-col) ==================== -->
  <section class="section" id="token-sentiments">
    <div class="container">
      <h2 class="section__title">Token Sentiments</h2>
      <div class="sentiment-grid" id="sentiment-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- ==================== Sentiment Trend Chart ==================== -->
  <section class="section" id="trend-section">
    <div class="container">
      <h2 class="section__title">Sentiment Trend</h2>
      <div class="chart-container">
        <canvas id="trend-chart"></canvas>
      </div>
    </div>
  </section>

  <!-- ==================== Social Sentiment ==================== -->
  <section class="section" id="social-section">
    <div class="container">
      <h2 class="section__title">Social Media Pulse</h2>
      <div class="social-grid" id="social-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- ==================== Footer ==================== -->
  <footer class="footer">
    <div class="container">
      <p class="footer__text">Fear & Greed via Alternative.me · Social data simulated</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
