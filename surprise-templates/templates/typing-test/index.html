<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{APP_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Recursive:wght@400;600;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <h1 class="logo">{{APP_TITLE}}</h1>
    </div>
    <div class="header-right">
      <span class="user-greeting">{{USER_NAME}}</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main class="main-content">
    <!-- Hero / Interactive Typing Area -->
    <section class="hero-section" id="heroSection">
      <div class="hero-inner">
        <p class="hero-tagline">Test your typing speed</p>
        <div class="controls-bar">
          <div class="time-selector">
            <button class="time-btn active" data-time="15">15s</button>
            <button class="time-btn" data-time="30">30s</button>
            <button class="time-btn" data-time="60">60s</button>
            <button class="time-btn" data-time="120">120s</button>
          </div>
          <div class="mode-selector">
            <button class="mode-btn active" data-mode="text">Text</button>
            <button class="mode-btn" data-mode="code">Code</button>
            <button class="mode-btn" data-mode="numbers">Numbers</button>
          </div>
        </div>

        <div class="typing-area" id="typingArea">
          <div class="text-display" id="textDisplay"></div>
          <input type="text" class="typing-input" id="typingInput" placeholder="Start typing here..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        </div>

        <div class="live-stats">
          <div class="stat-card" id="statWpm">
            <span class="stat-value">0</span>
            <span class="stat-label">WPM</span>
          </div>
          <div class="stat-card" id="statAccuracy">
            <span class="stat-value">100</span>
            <span class="stat-label">Accuracy %</span>
          </div>
          <div class="stat-card" id="statTime">
            <span class="stat-value">0</span>
            <span class="stat-label">Time (s)</span>
          </div>
          <div class="stat-card" id="statChars">
            <span class="stat-value">0</span>
            <span class="stat-label">Characters</span>
          </div>
        </div>

        <button class="restart-btn" id="restartBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Restart
        </button>
      </div>
    </section>

    <!-- History Section -->
    <section class="history-section" id="historySection">
      <h2 class="section-title">History</h2>
      <div class="chart-container">
        <canvas id="historyChart"></canvas>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>
  </main>

  <footer class="app-footer">
    <p>&copy; 2025 {{APP_TITLE}}. Keep typing.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
