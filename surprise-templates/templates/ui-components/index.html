<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>{{APP_TITLE}} — UI Components Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;700;800&family=Figtree:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀️</button>

  <!-- Hero -->
  <section class="hero" id="hero">
    <h1 class="hero__title">
      <span class="hero__accent">{{APP_TITLE}}</span> Components
    </h1>
    <p class="hero__subtitle">A curated collection of production-ready UI components by {{USER_NAME}}. Browse, preview, and copy.</p>
    <div class="hero__stats" id="heroStats">
      <div class="hero__stat">
        <div class="hero__stat-value" id="totalCount">0</div>
        <div class="hero__stat-label">Components</div>
      </div>
      <div class="hero__stat">
        <div class="hero__stat-value" id="categoryCount">0</div>
        <div class="hero__stat-label">Categories</div>
      </div>
      <div class="hero__stat">
        <div class="hero__stat-value" id="copyCount">0</div>
        <div class="hero__stat-label">Copies Today</div>
      </div>
    </div>
    <div class="hero__preview-bar">
      <span class="hero__preview-chip">&lt;Button /&gt;</span>
      <span class="hero__preview-chip">&lt;Card /&gt;</span>
      <span class="hero__preview-chip">&lt;Input /&gt;</span>
      <span class="hero__preview-chip">&lt;Modal /&gt;</span>
      <span class="hero__preview-chip">&lt;Nav /&gt;</span>
    </div>
  </section>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-box" id="searchBox" placeholder="Search components…">
    </div>
    <div class="filter-tags" id="filterTags">
      <button class="filter-tag active" data-filter="all">All</button>
      <button class="filter-tag" data-filter="layout">Layout</button>
      <button class="filter-tag" data-filter="form">Form</button>
      <button class="filter-tag" data-filter="data">Data</button>
      <button class="filter-tag" data-filter="navigation">Navigation</button>
      <button class="filter-tag" data-filter="feedback">Feedback</button>
    </div>
  </div>

  <!-- Gallery -->
  <main class="gallery" id="gallery"></main>

  <!-- No Results -->
  <div class="no-results" id="noResults" style="display:none">
    No components match your search.
  </div>

  <!-- Footer -->
  <footer class="footer">
    Built by {{USER_NAME}} · {{APP_TITLE}}
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
