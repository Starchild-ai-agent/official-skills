# Video Analysis Skill — FACTORY DEFAULTS (template only).
#
# ⚠️ DO NOT EDIT THIS FILE. It is overwritten on every skill auto-update.
# To customize, edit:  /data/workspace/config/video-analysis.yaml
#   (created automatically on first use; only needs the keys you override;
#    everything else falls back to the defaults below). Changes there take
#    effect immediately on the next analyze_video() call and survive updates.

# ─── Model Selection ───────────────────────────────────────────────
# Model used for native video understanding (must have supports_video: true).
#
# Default = gemini-3.1-flash-lite: best price/quality for video understanding.
#   Benchmarked on a 6MB clip vs gemini-3.1-pro-preview baseline:
#     gemini-3.1-flash-lite  ~$0.0014  8.1s   ~88% accuracy  ← default
#     gemini-3.5-flash       ~$0.0152  11.8s  ~85%
#     qwen/qwen3.6-plus      ~$0.0058  44.2s  ~95% (slow)
#     qwen/qwen3.6-flash     ~$0.0027  16.6s  ~80% (misreads subjects)
#     gemini-3.1-pro-preview ~$0.0199  19.7s  100% baseline
#
# For higher accuracy at higher cost, set to google/gemini-3.5-flash or
#   google/gemini-3.1-pro-preview. Other options: qwen/qwen3.6-plus,
#   qwen/qwen3.6-flash, minimax/minimax-m3.
default_model: google/gemini-3.1-flash-lite

# ─── Mode Threshold ────────────────────────────────────────────────
# Videos ≤ this size (MB) → sent to default_model natively (higher quality).
# Videos > this size → frame extraction + audio transcription (lower cost).
# Set to 0 to always use extraction. Set to 100 to always use native.
native_size_limit_mb: 20

# ─── Frame Extraction Settings ─────────────────────────────────────
# Only used when video exceeds native_size_limit_mb.
extraction:
  # Max keyframes to extract (controls token cost)
  max_frames: 30
  # For short videos (≤60s): extract a frame every N seconds
  short_video_interval_sec: 2
  # For long videos (>60s): scene-change detection threshold (0.0-1.0)
  # Lower = more frames captured. 0.3 is a good default.
  scene_threshold: 0.3
  # Whether to transcribe audio track via Whisper
  transcribe_audio: true
